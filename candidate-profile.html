<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Candidate Profile</title>
  <meta name="description" content="Talento HR Platform – Candidate profile" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />

  <style>
    #main-scroll { background: #f6f5f7; }
    #candidate-profile-content, #candidate-profile-content * { font-family: 'Alexandria', Helvetica, sans-serif; font-weight: 400; }

    .cp-screen-shell {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 16px;
      padding: 16px;
    }

    .cp-top-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .cp-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #a59fad; }
    .cp-crumb-link { color: #a59fad; text-decoration: none; }
    .cp-crumb-link:hover { color: #787085; }
    .cp-crumb-current { color: #1e1033; }
    .cp-crumb-separator { color: #d4cede; }
    .cp-nav-inline { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #787085; }
    .cp-link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; color: #787085; }

    .cp-heading-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
    .cp-title-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cp-main-title { font-size: 24px; line-height: 1.3; color: #1e1033; letter-spacing: -0.24px; }
    .cp-status-badge {
      display: inline-flex; align-items: center; height: 22px; padding: 0 10px;
      border-radius: 100px; background: #f3f4f6; color: #787085; font-size: 12px;
    }
    .cp-meta-row { margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: #787085; font-size: 14px; }
    .cp-meta-emphasis { color: #1e1033; }
    .cp-recruiter-inline { display: inline-flex; align-items: center; gap: 6px; }
    .cp-recruiter-inline img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

    .cp-heading-actions { display: flex; align-items: center; gap: 8px; }
    .cp-secondary-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none;
      height: 34px; padding: 0 12px; border: 1px solid #e8e7eb; border-radius: 10px;
      font-size: 14px; color: #1e1033; background: #fff; transition: background 150ms;
    }
    .cp-secondary-btn:hover { background: #f6f5f7; }
    .cp-icon-btn {
      width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #e8e7eb; border-radius: 10px; background: #fff; color: #787085;
    }

    .cp-action-strip {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      padding: 8px; border-radius: 10px; border: 1px solid #ece8f7; background: #f4f1ff; margin-bottom: 10px;
    }
    .cp-action-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cp-reject-btn, .cp-approve-btn {
      display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 10px; border-radius: 8px;
      font-size: 14px;
    }
    .cp-reject-btn { border: 1px solid #e8e7eb; color: #4b405c; background: #fff; }
    .cp-approve-btn { color: #fff; background: #1e1033; border: 1px solid #1e1033; }

    .cp-main-grid { display: flex; align-items: flex-start; gap: 12px; }
    .cp-left-col { flex: 1 1 66%; min-width: 0; display: grid; gap: 12px; }
    .cp-right-col { flex: 1 1 34%; min-width: 300px; display: grid; gap: 12px; }

    .cp-card {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 14px;
      overflow: hidden;
    }
    .cp-right-card { background: #E5E3E933; }

    .cp-stage-strip {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #ece9f3;
      display: flex; align-items: center; gap: 8px; overflow-x: auto;
      background: #f6f5f7;
    }
    .cp-stage-item { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .cp-stage-bullet {
      width: 24px; height: 24px; border-radius: 999px; border: 1px solid #d8d3e1;
      display: inline-flex; align-items: center; justify-content: center; color: #a59fad; font-size: 13px;
      background: #fff;
    }
    .cp-stage-item.done .cp-stage-bullet {
      border-color: #ba8aff; background: #ba8aff; color: #fff;
    }
    .cp-stage-item.active .cp-stage-bullet {
      border-color: #ba8aff; color: #ba8aff;
    }
    .cp-stage-label { color: #a59fad; font-size: 14px; white-space: nowrap; }
    .cp-stage-item.done .cp-stage-label { color: #ba8aff; }
    .cp-stage-item.active .cp-stage-label { color: #1e1033; }
    .cp-stage-line { width: 34px; height: 1px; background: #d9d2e5; flex-shrink: 0; }
    .cp-stage-item.done + .cp-stage-line { background: #ba8aff; }

    .cp-section-top {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 12px 14px; border-bottom: 1px solid #ece9f3;
    }
    .cp-section-top h3, .cp-card-header h3, .cp-section-title {
      font-size: 18px;
      line-height: 1.2;
      color: #1e1033;
    }
    .cp-card-header { padding: 14px 14px 0; }
    .cp-card-header p { margin-top: 2px; font-size: 14px; color: #787085; }

    .cp-cv-preview { padding: 10px 10px 12px; background: #f6f5f7; }
    .cp-cv-preview img {
      width: 100%; height: auto; display: block;
      border: 1px solid #d8d3e1; border-radius: 14px; background: #f6f5f7;
    }

    .cp-match-wrap {
      padding: 12px 14px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      align-items: start;
      gap: 14px;
    }
    .cp-tag-wrap { display: flex; align-items: center; align-content: flex-start; flex-wrap: wrap; gap: 6px; min-width: 0; }
    .cp-tag {
      display: inline-flex; align-items: center; gap: 4px; height: 24px; padding: 0 8px;
      border-radius: 100px; color: #1e1033; background: #ddd0f8; font-size: 12px;
    }
    .cp-tag-check {
      width: 14px; height: 14px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
      background: #ba8aff; color: #fff; flex-shrink: 0;
    }
    .cp-tag-check svg { width: 9px; height: 9px; }
    .cp-donut-wrap { width: 118px; height: 118px; position: relative; flex-shrink: 0; justify-self: end; align-self: start; }
    .cp-donut-wrap svg { display: block; }
    .cp-donut-label {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #787085; font-size: 14px;
    }
    .cp-donut-label span { color: #1e1033; font-size: 24px; line-height: 1.05; }

    .cp-contact-list, .cp-info-list { padding: 12px 14px 14px; display: grid; gap: 8px; }
    .cp-contact-row { display: grid; grid-template-columns: minmax(0, 1fr) 108px; gap: 8px; }
    .cp-contact-value, .cp-copy-btn {
      height: 44px;
      border: 1px solid #ddd8e8;
      border-radius: 14px;
      background: #fff;
      color: #1e1033;
      font-size: 14px;
    }
    .cp-contact-value {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0 14px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cp-contact-icon { color: #787085; display: inline-flex; align-items: center; flex-shrink: 0; }
    .cp-contact-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .cp-copy-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 12px; min-width: 96px;
    }

    .cp-info-row {
      display: grid; gap: 3px;
      border-bottom: 1px dashed #dfd9eb;
      padding: 8px 0;
    }
    .cp-info-row:last-child { border-bottom: none; }
    .cp-info-label { display: inline-flex; align-items: center; gap: 9px; color: #a59fad; font-size: 14px; }
    .cp-info-icon { display: inline-flex; align-items: center; justify-content: center; width: 14px; flex-shrink: 0; }
    .cp-info-value { color: #1e1033; font-size: 14px; padding-left: 23px; }

    .cp-section-title {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 14px 10px; border-bottom: 1px solid #ece9f3;
    }
    .cp-two-col-grid { display: flex; gap: 0; padding: 0 14px 14px; }
    .cp-two-col-grid > div { flex: 1; min-width: 0; }
    .cp-two-col-grid > div:first-child { padding-right: 18px; }
    .cp-two-col-grid > div:last-child { padding-left: 18px; }
    .cp-kv-row { display: grid; gap: 3px; border-bottom: 1px dashed #e5deef; padding: 7px 0; }
    .cp-kv-row:last-child { border-bottom: 1px dashed #e5deef; }
    .cp-kv-label-default { color: #a59fad; font-size: 14px; line-height: 1.35; }
    .cp-kv-label-trial { color: #787085; font-size: 14px; line-height: 1.35; }
    .cp-kv-value { font-size: 14px !important; line-height: 1.35; }
    .cp-kv-value-strong { color: #1e1033 !important; }
    .cp-kv-value-muted { color: #787085 !important; }
    .cp-copy-btn.is-copied { border-color: #BA8AFF; color: #6f49c9; background: #f4efff; }

    @media (max-width: 1200px) {
      .cp-main-grid { flex-direction: column; }
      .cp-right-col { min-width: 0; width: 100%; }
    }

    @media (max-width: 900px) {
      .cp-top-row { flex-direction: column; align-items: flex-start; }
      .cp-heading-actions { width: 100%; justify-content: flex-start; }
      .cp-main-grid { gap: 10px; }
      .cp-card-header { padding: 12px 12px 0; }
      .cp-match-wrap {
        padding: 10px 12px 12px;
        grid-template-columns: minmax(0, 1fr) 108px;
        gap: 10px;
      }
      .cp-donut-wrap { width: 108px; height: 108px; }
      .cp-donut-wrap svg { width: 108px; height: 108px; }
      .cp-two-col-grid { flex-direction: column; gap: 6px; }
      .cp-two-col-grid > div:first-child { border-right: none; padding-right: 0; }
      .cp-two-col-grid > div:last-child { padding-left: 0; }
      .cp-section-top h3, .cp-card-header h3, .cp-section-title { font-size: 18px; }
    }

    @media (max-width: 680px) {
      .cp-screen-shell { padding: 12px; border-radius: 12px; }
      .cp-main-title { font-size: 24px; }
      .cp-section-top h3, .cp-card-header h3, .cp-section-title { font-size: 18px; }
      .cp-contact-list { padding: 10px 12px 12px; }
      .cp-contact-row { grid-template-columns: minmax(0, 1fr) 82px; }
      .cp-copy-btn { width: 100%; justify-content: center; min-width: 82px; padding: 0 8px; }
      .cp-action-strip { align-items: flex-start; }
      .cp-match-wrap {
        grid-template-columns: minmax(0, 1fr) 96px;
        align-items: center;
      }
      .cp-donut-wrap { width: 96px; height: 96px; }
      .cp-donut-wrap svg { width: 96px; height: 96px; }
      .cp-donut-label { font-size: 12px; }
      .cp-donut-label span { font-size: 20px; }
      .cp-tag { font-size: 13px; height: 20px; padding: 0 8px; }
    }
  </style>
</head>
<body>

<div id="app">
  <aside id="sidebar"></aside>
  <div id="overlay"></div>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 16px;border-bottom:1px solid #e8e7eb;flex-shrink:0;background:#fff;"></header>
    <main id="main-scroll" style="padding:24px 20px 40px;">
      <div class="cp-screen-shell">
        <div id="candidate-profile-content"></div>
      </div>
    </main>
  </div>
</div>

<script src="layout.js"></script>
<script src="candidate_profile_components.js"></script>
<script>
(function() {
  'use strict';

  const cvImageCandidates = ['./CV.png', 'CV.png', './cv.png', './60121e4b1c8ed4cfa74a4ffcfdc409dd9b2bc03e.png'];

  const pageData = {
    pipelineHeader: {
      items: [
        { label: 'Pipeline', href: '#' },
        { label: 'Candidate profile' }
      ],
      currentIndex: 1,
      total: 2
    },
    candidate: {
      name: 'Samira AlSubaie',
      badge: 'In review',
      jobTitle: 'Product designer',
      appliedDate: '12 Jan 2026',
      recruiterName: 'Mishari AlSubaie',
      recruiterAvatar: 'https://randomuser.me/api/portraits/men/35.jpg'
    },
    cv: {
      cvImageSrc: './CV.png',
      cvDownloadName: 'samira-alsubaie-cv.png',
      stageConfig: {
        stages: ['New', 'First interview', 'Second interview', 'Job offer'],
        activeStage: 1
      }
    },
    predictedMatch: {
      title: 'Predicted match',
      subtitle: 'Product designer L2',
      tags: ['Wireframes', 'Figma', 'User research', 'Fintech', 'Atlassian', 'JIRA', 'SCRUM', 'Lottie animations'],
      percent: 62
    },
    contacts: {
      contacts: [
        { icon: CandidateProfileComponents.Icons.mail, value: 'alabdulkarim@company.com' },
        { icon: CandidateProfileComponents.Icons.phone, value: '+966-32532-7457' }
      ]
    },
    additional: {
      items: [
        { icon: CandidateProfileComponents.Icons.briefcase, label: 'Experience', value: '8 years of experience' },
        { icon: CandidateProfileComponents.Icons.calendar, label: 'Available start date', value: 'May 27, 2026' },
        { icon: CandidateProfileComponents.Icons.mapPin, label: 'Address', value: '335 South 560 West Lindon, Utah 84042' },
        { icon: CandidateProfileComponents.Icons.graduationCap, label: 'College/University', value: 'NYU' },
        { icon: CandidateProfileComponents.Icons.user, label: 'Highest Education Obtained', value: 'College - Bachelor of Fine Arts' },
        { icon: CandidateProfileComponents.Icons.user, label: 'Referred By', value: 'Mishari AlSubaie' }
      ]
    },
    salaryDetails: {
      title: 'Salary and allowances details',
      icon: CandidateProfileComponents.Icons.briefcase,
      leftItems: [
        { label: 'Basic salary during trial period', value: 'SAR 15,500.00' },
        { label: 'Total allowance during trial period', value: 'SAR 2,000.00' },
        { label: 'Current salary', value: 'Not Provided' }
      ],
      rightItems: [
        { label: 'Expected salary', value: 'SAR 15,000.00' },
        { label: 'Proposed salary after trial period', value: 'SAR 14,000.00' },
        { label: 'Total allowance during after trial period', value: 'SAR 3,000.00' }
      ]
    },
    personalInformation: {
      title: 'Personal information',
      icon: CandidateProfileComponents.Icons.user,
      leftItems: [
        { label: 'Nationality', value: 'Not Provided' },
        { label: 'Marital status', value: 'Single' },
        { label: 'Birth date', value: 'Not Provided' },
        { label: 'Iqama expiry date', value: 'Not Provided' },
        { label: 'Profession in Iqama', value: 'Not Provided' }
      ],
      rightItems: [
        { label: 'Gender', value: 'Female' },
        { label: 'Religion', value: 'Muslim' },
        { label: 'Iqama ID', value: 'Not Provided' },
        { label: 'Iqama issue date', value: 'Not Provided' },
        { label: 'Iqama issue place', value: 'Not Provided' }
      ]
    }
  };

  function resolveCvImageSrc(candidates) {
    return new Promise(function(resolve) {
      let index = 0;
      function tryNext() {
        if (index >= candidates.length) {
          resolve(candidates[0]);
          return;
        }
        const src = candidates[index++];
        const img = new Image();
        img.onload = function() { resolve(src); };
        img.onerror = tryNext;
        img.src = src;
      }
      tryNext();
    });
  }

  document.addEventListener('DOMContentLoaded', async function() {
    pageData.cv.cvImageSrc = await resolveCvImageSrc(cvImageCandidates);
    CandidateProfileComponents.render('#candidate-profile-content', pageData);
  });
})();
</script>

</body>
</html>
