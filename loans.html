<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Loans</title>
  <meta name="description" content="Talento HR Platform – Loans Management" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Shared layout styles -->
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       LOANS PAGE-SPECIFIC STYLES
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────
       PAGE HEADER
    ───────────────────────────────────────── */
    .loans-page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .loans-page-title {
      font-size: 20px;
      font-weight: 500;
      color: #1e1033;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .loans-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .loans-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 13px;
      color: #4b405c;
      background: #f6f5f7;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 150ms;
      font-weight: 400;
      white-space: nowrap;
    }

    .loans-action-btn:hover {
      background: #eceaef;
      border-color: #d2cfd6;
    }

    /* ─────────────────────────────────────────
       SUMMARY CARDS
    ───────────────────────────────────────── */
    .loans-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .loan-summary-card {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 12px;
      padding: 20px;
      transition: all 150ms;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .loan-summary-card:hover {
      box-shadow: 0 2px 8px rgba(30, 16, 51, 0.08);
      border-color: #d2cfd6;
    }

    /* ─────────────────────────────────────────
       SEARCH & FILTER BAR
    ───────────────────────────────────────── */
    .loans-search-filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .loans-search-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f6f5f7;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      padding: 0 12px;
      height: 38px;
      min-width: 240px;
      flex: 1;
      max-width: 400px;
    }

    .loans-search-input-wrap svg {
      color: #787085;
      flex-shrink: 0;
    }

    .loans-search-input-wrap input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #1e1033;
      width: 100%;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .loans-search-input-wrap input::placeholder {
      color: #787085;
    }

    .loans-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 38px;
      font-size: 13px;
      color: #4b405c;
      background: #f6f5f7;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 150ms;
      font-weight: 400;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .loans-filter-btn:hover {
      background: #eceaef;
      border-color: #d2cfd6;
    }

    .loans-toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      height: 38px;
      font-size: 13px;
      color: #4b405c;
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 150ms;
      font-weight: 400;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .loans-toolbar-btn:hover {
      background: #f6f5f7;
      border-color: #d2cfd6;
    }

    .loans-create-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 38px;
      font-size: 13px;
      color: #fff;
      background: #1e1033;
      border: 1px solid #1e1033;
      border-radius: 8px;
      cursor: pointer;
      transition: all 150ms;
      font-weight: 500;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .loans-create-btn:hover {
      background: #2d1a4d;
      border-color: #2d1a4d;
    }

    /* ─────────────────────────────────────────
       TABLE
    ───────────────────────────────────────── */
    .loans-table-container {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 12px;
      overflow: hidden;
    }

    .loans-table {
      width: 100%;
      border-collapse: collapse;
    }

    .loans-table thead {
      background: #f6f5f7;
      border-bottom: 1px solid #e8e7eb;
    }

    .loans-table thead th {
      padding: 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      color: #787085;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .loans-table tbody tr {
      border-bottom: 1px solid #e8e7eb;
      transition: background 150ms;
    }

    .loans-table tbody tr:last-child {
      border-bottom: none;
    }

    .loans-table tbody tr:hover {
      background: #fafafa;
    }

    .loan-table-row td {
      vertical-align: middle;
    }

    .loan-actions-btn:hover {
      background: #f6f5f7 !important;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 1024px) {
      .loans-summary-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .loans-table-container {
        overflow-x: auto;
      }

      .loans-table {
        min-width: 1000px;
      }
    }

    @media (max-width: 640px) {
      .loans-page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .loans-header-actions {
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .loans-summary-grid {
        grid-template-columns: 1fr;
      }

      .loans-search-filter-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .loans-search-input-wrap {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

    <!-- Sidebar (injected by layout.js) -->
    <div id="sidebar"></div>

    <!-- Main content column -->
    <div id="main-col">

      <!-- Main Content Area -->
      <main style="flex:1;padding:24px 32px;overflow-y:auto;background:#fff;">
        <div id="loans-content"></div>
      </main>
    </div>
  </div>

  <!-- Overlay (mobile backdrop) -->
  <div id="overlay"></div>

  <!-- Load layout and components -->
  <script src="layout.js"></script>
  <script src="loans_components.js"></script>

  <script>

        nextInstallment: '25 Dec 2025',
        status: 'active',
        paidAmount: 'SAR 12,000',
        paidPercentage: '56',
        totalAmount: 'SAR 19,000',
        remainingAmount: 'SAR 7,000',
        remainingPercentage: '44'
      },
      {

        employeeName: 'Mishari AlSubaie',

        status: 'active',

    function renderLoansPage() {
      const content = document.getElementById('loans-content');

      // Page Header
      const headerHTML = LoansComponents.PageHeader({
        title: 'Loans',
        actions: [
          { 
            label: 'Loans summary', 
            href: '#',
            icon: LoansComponents.Icons.fileText
          },
          { 
            label: 'Loan installments', 
            href: '#',

          },
          { 
            label: 'Salary in Advance', 
            href: '#',

          },
          {

          }
        ]

      // Summary Cards
      const summaryCardsHTML = `

          ${LoansComponents.LoanSummaryCard({

      // Search & Filter Bar
      const searchFilterHTML = LoansComponents.SearchFilterBar({
        searchPlaceholder: 'Search',

        filterCount: 2,
        showExport: true,
        exportText: 'Export all',
        showCreateNew: true,
        createNewText: 'Create new loan'
      });

      // Table
      const tableRowsHTML = loansData.map(loan => 
        LoansComponents.LoanTableRow(loan)

      const tableHTML = `
        <div class="loans-table-container">
          <table class="loans-table">
            <thead>
              <tr>

      // Render everything
      content.innerHTML = headerHTML + summaryCardsHTML + searchFilterHTML + tableHTML;
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', () => {
      renderLoansPage();
    });
  </script>
</body>
</html>
