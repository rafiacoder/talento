<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Requests</title>
  <meta name="description" content="Talento HR Platform - Requests" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    .requests-page-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px 20px 24px;
      min-width: 0;
      overflow: hidden;
    }

    .requests-shell {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .requests-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .requests-title {
      color: #1e1033;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .requests-scope-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid #e8e7eb;
      background: #f6f5f7;
      flex-wrap: wrap;
    }

    .requests-scope-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      color: #787085;
      font-size: 14px;
      line-height: 1;
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
      white-space: nowrap;
    }

    .requests-scope-btn:hover:not(.active) {
      background: rgba(236, 233, 239, 0.55);
    }

    .requests-scope-btn.active {
      color: #1e1033;
      background: #fff;
      box-shadow: 0 1px 2px rgba(30, 16, 51, 0.08);
    }

    .requests-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ede5ff;
      color: #8b5cf6;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }

    .requests-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .requests-search {
      flex: 0 0 280px;
      width: 280px;
      min-width: 220px;
      max-width: 280px;
    }

    .requests-search .search-input-wrap,
    .requests-search-fallback {
      display: flex !important;
      align-items: center !important;
      flex-wrap: nowrap !important;
      width: 100% !important;
      height: 32px !important;
      padding: 0 12px !important;
      gap: 8px !important;
      border-radius: 999px !important;
      background: #f6f5f7 !important;
      border: 1px solid #dbd8e2 !important;
      box-shadow: none !important;
    }

    .requests-search .search-input-wrap input,
    .requests-search-fallback input {
      flex: 1 1 auto !important;
      min-width: 0 !important;
      height: 100% !important;
      margin: 0 !important;
      font-size: 14px !important;
      color: #5a5269 !important;
      line-height: 1.2 !important;
    }

    .requests-search .search-input-wrap svg,
    .requests-search-fallback svg,
    .requests-search-fallback i {
      width: 14px;
      height: 14px;
      color: #9a94a8;
      stroke: #9a94a8;
      flex-shrink: 0;
    }

    .requests-search .search-input-wrap svg,
    .requests-search-fallback svg {
      display: block;
    }

    .requests-search-fallback i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .requests-search .search-input-wrap input::placeholder,
    .requests-search-fallback input::placeholder {
      color: #8f899f;
    }

    .requests-filter-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      background: #fff;
      font-size: 14px;
    }

    .requests-filter-count {
      color: #787085;
    }

    .requests-status-row {
      padding-bottom: 12px;
      border-bottom: 1px solid #f0eef6;
    }

    .requests-status-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .requests-status-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 8px 2px;
      color: #787085;
      font-size: 14px;
      line-height: 1;
      border-bottom: 2px solid transparent;
      transition: color 150ms ease, border-color 150ms ease, background 150ms ease;
      white-space: nowrap;
    }

    .requests-status-tab:hover:not(.active) {
      color: #4b405c;
      background: rgba(236, 233, 239, 0.3);
      border-radius: 8px;
    }

    .requests-status-tab.active {
      color: #1e1033;
      font-weight: 500;
      border-color: #1e1033;
    }

    .requests-status-icon {
      width: 14px;
      text-align: center;
      font-size: 13px;
      color: inherit;
      flex-shrink: 0;
    }

    .requests-table-container {
      border-radius: 16px;
    }

    .requests-table {
      min-width: 1080px;
    }

    .requests-table th,
    .requests-table td {
      padding-top: 14px;
      padding-bottom: 14px;
      font-size: 14px;
    }

    .requests-table th {
      color: #787085;
      font-weight: 400;
    }

    .requests-table td {
      color: #1e1033;
    }

    .requests-table .badge-pending,
    .requests-table .badge-review,
    .requests-table .badge-approved,
    .requests-table .badge-rejected,
    .requests-table .badge-default {
      height: 24px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      line-height: 1;
    }

    .requests-table .badge-pending,
    .requests-table .badge-review {
      background: #efedf2 !important;
      color: #676078 !important;
    }

    .requests-table .badge-approved {
      background: #dcf7e6 !important;
      color: #1a9a54 !important;
    }

    .requests-table .badge-rejected {
      background: #fde2e6 !important;
      color: #d73a49 !important;
    }

    .requests-table .badge-default {
      background: #f1eff4;
      color: #7a7387;
    }

    .requests-table th:nth-child(2),
    .requests-table td:nth-child(2) {
      width: 150px;
      text-align: center;
    }

    .requests-table th:nth-child(2) .requests-header-label {
      justify-content: center;
    }

    .requests-table th:first-child,
    .requests-table td:first-child {
      width: 310px;
    }

    .requests-header-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .requests-actions-header {
      text-align: right;
      width: 140px;
    }

    .requests-employee-cell,
    .requests-approver-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .requests-employee-cell {
      min-width: 260px;
    }

    .requests-person-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .requests-person-name,
    .requests-approver-name {
      color: #1e1033;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .requests-person-role {
      color: #787085;
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .requests-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #ece9ef;
      box-shadow: 0 4px 12px rgba(30, 16, 51, 0.08);
    }

    .requests-avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4b405c;
      font-size: 12px;
      font-weight: 600;
    }

    .requests-dates-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .requests-type-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1e1033;
      font-size: 14px;
    }

    .requests-type-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      color: #4b405c;
      flex-shrink: 0;
    }

    .requests-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .requests-view-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      border-radius: 10px;
      background: #211034;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
      white-space: nowrap;
    }

    .requests-view-btn:hover {
      background: #2a1745;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(30, 16, 51, 0.22);
    }

    .requests-view-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #2cf7b3;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .requests-view-arrow svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .requests-more-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid #e8e7eb;
      color: #787085;
      background: #fff;
      transition: background 150ms ease, color 150ms ease;
    }

    .requests-more-btn:hover {
      background: #f6f5f7;
      color: #4b405c;
    }

    .requests-empty-wrap {
      border: 1px solid #e8e7eb;
      border-radius: 16px;
      background: #fff;
    }

    .requests-empty-fallback {
      padding: 48px 24px;
      text-align: center;
    }

    .requests-empty-fallback h3 {
      font-size: 18px;
      font-weight: 500;
      color: #1e1033;
      margin-bottom: 8px;
    }

    .requests-empty-fallback p {
      font-size: 14px;
      color: #787085;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .requests-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .requests-page-card {
        padding: 16px;
      }

      .requests-scope-toggle {
        width: 100%;
      }

      .requests-scope-btn {
        flex: 1 1 140px;
        justify-content: center;
      }

      .requests-toolbar {
        align-items: stretch;
      }

      .requests-search {
        max-width: none;
        width: 100%;
        flex-basis: 100%;
      }

      .requests-filter-btn {
        align-self: flex-start;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <div id="main-scroll">
      <div style="padding:16px;background:#f6f5f7;min-height:calc(100vh - 56px);">
        <div class="requests-page-card">
          <div id="requests-screen-root"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="leave_components.js"></script>
<script src="requests_components.js"></script>
<script src="request2_screen.js"></script>
</body>
</html>
