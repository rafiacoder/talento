<!DOCTYPE html>
<html lang="en">

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Shared layout styles -->
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       AIR TICKETS PAGE-SPECIFIC STYLES
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────
       DATE NAV PILL (bordered)
    ───────────────────────────────────────── */
    .date-nav-pill {
      display: inline-flex; align-items: center; gap: 10px;
      height: 34px; padding: 0 12px;
      border: 1px solid #e8e7eb; border-radius: 999px;
      background: #F6F5F7;
      font-size: 13px; color: #4b405c;
    }
    .date-nav-pill button {
      display: flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      color: #4b405c; background: transparent; border: none;
      cursor: pointer; padding: 0; flex-shrink: 0;
    }
    .date-nav-pill .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #787085; flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       TOOLBAR BUTTONS
    ───────────────────────────────────────── */
    .toolbar-btn {
      display: inline-flex; align-items: center; gap: 5px;
      height: 32px; padding: 0 10px;
      border: 1px solid #e8e7eb; border-radius: 8px;
      font-size: 13px; color: #1e1033; background: #fff;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 0.5px 1px rgba(30,16,51,.12);
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .toolbar-btn:hover { background: #f5f3fb; }

    .filter-btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 12px;
      border: 1px solid #e8e7eb; border-radius: 999px;
      font-size: 13px; color: #1e1033; background: #fff;
      cursor: pointer; white-space: nowrap;
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .filter-btn:hover { background: #f5f3fb; }

    /* ─────────────────────────────────────────
       VIEW TOGGLE
    ───────────────────────────────────────── */
    .view-wrap {
      display: flex; align-items: center;
      background: #f6f5f7; border: 1px solid #e8e7eb;
      border-radius: 999px; padding: 2px; height: 32px;
    }
    .view-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; transition: background 150ms;
      border: none; background: transparent; color: #787085;
    }
    .view-btn.active {
      background: #fff; border: 1px solid #e8e7eb;
      box-shadow: 0 0.5px 1px rgba(30,16,51,.15); color: #1e1033;
    }
    .view-btn:not(.active):hover { background: rgba(236,233,239,.55); }

    /* ─────────────────────────────────────────
       CREATE NEW BUTTON (Purple)
    ───────────────────────────────────────── */
    .create-new-btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 14px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #fff;
      background: #1e1033;
      cursor: pointer; white-space: nowrap;
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
      border: none;
      box-shadow: 0 1px 2px rgba(30,16,51,.2);
    }
    .create-new-btn:hover { background: #2d1a4a; }

    /* ─────────────────────────────────────────
       TABLE & BADGE STYLES - All in shared-styles.css
    ───────────────────────────────────────── */

    /* ─────────────────────────────────────────
       PAGINATION
    ───────────────────────────────────────── */
    .pg-wrap {
      display: flex; align-items: center; justify-content: flex-start;
      flex-wrap: wrap; gap: 8px;
      min-width: 0;
    }
    .pg-wrap > * { flex-shrink: 0; }
    .pg-nav-btn {
      display: inline-flex; align-items: center; gap: 4px;
      height: 30px; padding: 0 10px;
      border: 1px solid #e8e7eb; border-radius: 6px;
      font-size: 12px; color: #4b405c; background: #F6F5F7;
      cursor: pointer; font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .pg-nav-btn:hover { background: #f5f3fb; }
    .pg-pages-wrap {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap; justify-content: flex-start;
      background: #F6F5F7; border: 1px solid #e8e7eb; border-radius: 6px;
      padding: 3px 6px;
    }
    .pg-page-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 24px; height: 24px; padding: 0 6px;
      border: none; border-radius: 6px;
      font-size: 12px; color: #4b405c; background: transparent;
      cursor: pointer; font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .pg-page-btn:hover:not(.pg-active) { background: #f5f3fb; }
    .pg-page-btn.pg-active {
      background: #fff; color: #1e1033; border: 1px solid #e8e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .pg-dots { font-size: 12px; color: #787085; padding: 0 2px; }

    /* ─────────────────────────────────────────
       MOBILE / RESPONSIVE HELPERS
    ───────────────────────────────────────── */

    /* header: allow wrapping */
    .page-header-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }

    /* toolbar: wraps on small screens */
    .toolbar-row {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 8px;
      min-width: 0;
    }
    .toolbar-right { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; justify-content: flex-start; min-width: 0; }
    .toolbar-right > * { flex-shrink: 0; }

    /* pagination: stack on very small */
    @media (max-width: 480px) {
      .pg-wrap { justify-content: flex-start; gap: 4px; }
      .pg-nav-btn { padding: 0 8px; font-size: 11px; height: 28px; }
      .pg-page-btn { min-width: 22px; height: 22px; font-size: 11px; padding: 0 4px; }
      .toolbar-btn { font-size: 11px; padding: 0 8px; height: 28px; }
    }
  </style>
</head>

              </button>
            </div>
          </div>

        </div>
        <!-- /MAIN CARD -->

      </div>
    </div>
    <!-- /SCROLL -->

  </div>
  <!-- /MAIN COL -->

</div>

// Initialize table on page load
document.addEventListener('DOMContentLoaded', function() {
  renderTableRows();
});

// Render table rows
function renderTableRows() {
  const tbody = document.getElementById('tickets-table-body');
  if (!tbody) return;

  const rows = airTicketsData.map(ticket => {
    // Determine request type badge class
    const requestTypeBadgeClass = ticket.requestType === 'Leave' ? 'badge-leave' : 'badge-business-mission';
    
    // Determine payment status badge class
    const paymentStatusBadgeClass = ticket.paymentStatus === 'Done' ? 'badge-done' : 'badge-need-to-pay';

    return `
      <tr>
        <td style="padding-left: 14px;">
          <input type="checkbox" style="cursor: pointer;" />
        </td>
        <td>${ticket.createdDate}</td>
        <td>${ticket.code}</td>
        <td>
          <div class="employee-cell">
            <img src="${ticket.employeeAvatar}" alt="${ticket.employee}" class="employee-avatar" />
            <span>${ticket.employee}</span>
          </div>
        </td>
        <td>
          <span class="${requestTypeBadgeClass}">${ticket.requestType}</span>
        </td>
        <td>${ticket.airTicketType}</td>
        <td>${ticket.travelDate}</td>
        <td>${ticket.totalPrice}</td>
        <td>
          <span class="${paymentStatusBadgeClass}">${ticket.paymentStatus}</span>
        </td>
        <td class="col-actions">
          <button style="background:transparent;border:none;cursor:pointer;color:#787085;display:flex;align-items:center;justify-content:center;width:100%;padding:0;" title="More actions">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="12" cy="19" r="2.5"/></svg>
          </button>
        </td>
      </tr>
    `;
  }).join('');

  tbody.innerHTML = rows;
}

/* View toggle */
function switchView(el) {
  document.querySelectorAll('.view-btn').forEach(function (b) { b.classList.remove('active'); });
  el.classList.add('active');
}

/* Pagination */
function pgSelect(el) {
  document.querySelectorAll('.pg-page-btn').forEach(function (b) { b.classList.remove('pg-active'); });
  el.classList.add('pg-active');
}
