        { value: 'all-questions', label: 'One page with all the questions' },
        { value: 'per-question', label: 'One page per question' },
        { value: 'per-section', label: 'One page per section' }
      ],
      copyLabel: 'Copy responder link',
      cancelLabel: 'Cancel',
      publishLabel: 'Save & publish',
      publishHref: 'create-new-evaluation-launched.html'
    }
  };

  const root = document.getElementById('create-new-evaluation-review-launch-root');

  function renderScreen() {
    if (!root) return;
    root.innerHTML = `
      ${CreateNewEvaluationComponents.PageHeader({ title: screenData.title })}
      <div class="ce-flow-stack">
        ${CreateNewEvaluationComponents.Stepper({ steps: screenData.steps })}
        ${CreateNewEvaluationReviewLaunchComponents.ReviewCard(screenData.review)}
        ${CreateNewEvaluationReviewLaunchComponents.ReviewDetailsPanel({
          additional: screenData.additional,
          employees: screenData.employees,
          evaluators: screenData.evaluators
        })}
        ${CreateNewEvaluationReviewLaunchComponents.LaunchCard(screenData.launch)}
        ${CreateNewEvaluationReviewLaunchComponents.SaveLaunchModal(screenData.saveLaunchForm)}
      </div>
    `;
  }

  function bindInteractions() {
    if (!root || root.dataset.bound === 'true') return;
    root.dataset.bound = 'true';

    root.addEventListener('click', function(event) {
      const openBtn = event.target.closest('.js-open-launch-modal');
      const closeBtn = event.target.closest('.js-close-launch-modal');
      const modal = root.querySelector('#save-launch-modal');
      const segmentedBtn = event.target.closest('.rl-segmented-btn');
      const layoutOption = event.target.closest('.rl-layout-option');

      if (openBtn && modal) {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }

      if (closeBtn && modal) {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      if (modal && event.target === modal) {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      if (segmentedBtn) {
        const group = segmentedBtn.closest('.rl-segmented');
        if (group) {
          group.querySelectorAll('.rl-segmented-btn').forEach(function(btn) {
            btn.classList.toggle('is-active', btn === segmentedBtn);
          });
        }
      }

      if (layoutOption) {
        const row = layoutOption.closest('.rl-layout-row');
        if (row) {
          row.querySelectorAll('.rl-layout-option').forEach(function(option) {
            option.classList.toggle('is-selected', option === layoutOption);
          });
        }
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    renderScreen();
    bindInteractions();
  });
})();
</script>
</body>
</html>
