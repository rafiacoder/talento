<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Appraisal Employee profile</title>
  <meta name="description" content="Talento HR Platform - Appraisal employee profile" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll {
      background: #f6f5f7;
    }

    .aep-page-wrap {
      padding: 16px;
      min-height: calc(100vh - 56px);
    }

    .aep-page-inner {
      max-width: 1400px;
      margin: 0 auto;
    }

    .aep-screen-card {
      background: #ffffff;
      border: 1px solid #ece9ef;
      border-radius: 24px;
      padding: 18px 18px 20px;
      box-shadow: 0 10px 24px rgba(30, 16, 51, 0.04);
    }

    .aep-screen {
      display: grid;
      gap: 12px;
    }

    .aep-header {
      display: grid;
      gap: 16px;
      padding-bottom: 2px;
    }

    .aep-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .aep-breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 14px;
      line-height: 1.4;
      color: #787085;
    }

    .aep-breadcrumb-item--current {
      color: #4b405c;
    }

    .aep-breadcrumb-divider {
      color: #b0a9bb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aep-pager {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .aep-pager-btn {
      border: none;
      background: transparent;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.4;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
    }

    .aep-pager-progress {
      font-size: 14px;
      line-height: 1.4;
      color: #4b405c;
      font-weight: 500;
    }

    .aep-profile-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .aep-profile-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 560px;
    }

    .aep-profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e7e1f2;
      box-shadow: 0 8px 16px rgba(30, 16, 51, 0.1);
      flex-shrink: 0;
      background: #f3edf9;
    }

    .aep-profile-copy {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .aep-profile-name {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
      letter-spacing: -0.2px;
    }

    .aep-profile-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 14px;
      line-height: 1.45;
      color: #787085;
    }

    .aep-meta-sep {
      color: #b0a9bb;
    }

    .aep-state-pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .aep-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .aep-edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid #1e1033;
      background: #1e1033;
      color: #ffffff;
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      box-shadow: 0 10px 18px rgba(30, 16, 51, 0.2);
      white-space: nowrap;
    }

    .aep-edit-btn svg {
      stroke: #2cf7b3;
      color: #2cf7b3;
    }

    .aep-more-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid #ece9ef;
      background: #ffffff;
      color: #8b8499;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aep-tabs {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #ece9ef;
      padding-bottom: 10px;
    }

    .aep-tab {
      border: none;
      background: transparent;
      color: #787085;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 0 9px;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
      transition: color 150ms ease, border-color 150ms ease;
    }

    .aep-tab.active {
      color: #1e1033;
      border-bottom-color: #1e1033;
      font-weight: 500;
    }

    .aep-tab-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .aep-content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.42fr);
      gap: 14px;
      align-items: start;
    }

    .aep-left-col,
    .aep-right-col {
      display: grid;
      gap: 10px;
    }

    .aep-card {
      background: #f9f8fb;
      border: 1px solid #ece9ef;
      border-radius: 18px;
      padding: 14px;
    }

    .aep-card-title {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .aep-card--level {
      background: #eef9f5;
      border-color: #bfeee1;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 90px;
    }

    .aep-level-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d8f6ea;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .aep-level-copy {
      display: grid;
      gap: 2px;
    }

    .aep-level-label {
      color: #787085;
      font-size: 14px;
      line-height: 1.4;
    }

    .aep-level-value {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      font-size: 36px;
      line-height: 1.2;
      color: #1e1033;
      font-weight: 500;
    }

    .aep-level-percent {
      color: #34b58a;
    }

    .aep-bullet-list {
      display: grid;
      gap: 9px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .aep-bullet-row {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.45;
    }

    .aep-bullet-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aep-card--conclusion .aep-conclusion-copy {
      display: grid;
      grid-template-columns: 3px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.45;
    }

    .aep-conclusion-line {
      display: inline-flex;
    }

    .aep-conclusion-text {
      margin: 0;
      color: #1e1033;
    }

    .aep-card--status {
      display: grid;
      gap: 12px;
      min-height: 112px;
      align-content: center;
    }

    .aep-status-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .aep-status-title {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #787085;
      font-size: 14px;
      line-height: 1.4;
    }

    .aep-status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #787085;
      flex-shrink: 0;
    }

    .aep-open-btn {
      border: none;
      background: transparent;
      color: #787085;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      padding: 0;
    }

    .aep-status-body .ped-feedback-status {
      font-size: 14px;
      line-height: 1.4;
      color: #1e1033;
      gap: 8px;
      font-weight: 500;
      white-space: normal;
    }

    .aep-peer-stack {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .aep-peer-count {
      font-size: 36px;
      line-height: 1.1;
      color: #1e1033;
      font-weight: 500;
      letter-spacing: -0.4px;
    }

    .aep-peer-avatars {
      display: inline-flex;
      align-items: center;
      margin-left: 2px;
    }

    .aep-peer-avatars img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ffffff;
      margin-left: -6px;
      background: #f1ecf8;
    }

    .aep-peer-avatars img:first-child {
      margin-left: 0;
    }

    @media (max-width: 1100px) {
      .aep-content-grid {
        grid-template-columns: 1fr;
      }

      .aep-right-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .aep-page-wrap {
        padding: 12px 10px 18px;
      }

      .aep-screen-card {
        border-radius: 20px;
        padding: 14px;
      }

      .aep-header-top,
      .aep-profile-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .aep-profile-main {
        width: 100%;
      }

      .aep-header-actions {
        width: 100%;
      }

      .aep-edit-btn {
        flex: 1;
        justify-content: center;
      }

      .aep-right-col {
        grid-template-columns: 1fr;
      }

      .aep-level-value,
      .aep-peer-count {
        font-size: 30px;
      }
    }

    @media (max-width: 520px) {
      .aep-tabs {
        gap: 12px;
      }

      .aep-tab {
        padding-bottom: 7px;
      }

      .aep-profile-avatar {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <div id="main-scroll">
      <div class="aep-page-wrap">
        <div class="aep-page-inner">
          <div class="aep-screen-card">
            <div id="appraisal-employee-profile-root" class="aep-screen"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="performance_evaluation_components.js"></script>
<script src="performance_evaluation_detail_components.js"></script>
<script src="appraisal_employee_profile_components.js"></script>
<script>
(function() {
  'use strict';

  const screenData = {
    header: {
      breadcrumb: [
        'Performance evaluations list',
        'Performance evaluations name',
        'Employee profile'
      ],
      pager: {
        backLabel: 'Back',
        progress: '2 of 213',
        nextLabel: 'Next'
      },
      employee: {
        name: 'Sarah AlSubaie',
        role: 'HR Business Partner',
        review: 'Q1 2024 Performance Review',
        period: 'January - March 2024',
        state: 'In progress',
        avatar: 'https://randomuser.me/api/portraits/women/65.jpg'
      },
      actions: {
        primaryLabel: 'Edit evaluation'
      }
    },
    tabs: [
      { id: 'summary', label: 'Summary', icon: 'summary' },
      { id: 'answers', label: 'Answers', icon: 'answers' },
      { id: 'peer-feedback', label: 'Peer feedback', icon: 'peerFeedback' },
      { id: 'self-review', label: 'Self review', icon: 'selfReview' },
      { id: 'evaluators', label: 'Evaluators', icon: 'evaluators' }
    ],
    summary: {
      level: {
        label: 'Performance level',
        value: 'Very good',
        percent: '82%'
      },
      listCards: [
        {
          title: 'Key strengths',
          tone: 'strength',
          items: [
            'Exceptional design thinking and user-centered approach',
            'Strong collaboration and communication with cross-functional teams',
            'Proactive in mentoring junior designers',
            'Consistently delivers high-quality work on time'
          ]
        },
        {
          title: 'Areas for improvement',
          tone: 'improvement',
          items: [
            'Could benefit from deeper involvement in strategic planning sessions',
            'Opportunity to expand technical skills in prototyping tools'
          ]
        }
      ],
      conclusion: {
        title: "Manager's conclusion",
        text: '"Sarah is a valuable asset to the team and has exceeded expectations this quarter. I recommend her for the senior leadership development program and propose a discussion about expanding her responsibilities in the next quarter."'
      }
    },
    sideCards: [
      {
        title: 'Direct manager evaluation',
        icon: 'evaluators',
        statusType: 'completed',
        statusLabel: 'Completed'
      },
      {
        title: 'Upward feedback',
        icon: 'peerFeedback',
        statusType: 'pending',
        statusLabel: 'Pending evaluation'
      },
      {
        title: 'Received peer feedback',
        icon: 'peerFeedback',
        type: 'peer',
        summary: {
          count: '2/3',
          avatars: [
            'https://randomuser.me/api/portraits/men/46.jpg',
            'https://randomuser.me/api/portraits/men/67.jpg'
          ]
        }
      },
      {
        title: 'Self-review evaluation',
        icon: 'selfReview',
        statusType: 'pending',
        statusLabel: 'Pending evaluation'
      }
    ]
  };

  let activeTab = 'summary';
  const root = document.getElementById('appraisal-employee-profile-root');

  function render() {
    if (!root) return;

    root.innerHTML = `
      ${AppraisalEmployeeProfileComponents.Header(screenData.header)}
      ${AppraisalEmployeeProfileComponents.Tabs({
        tabs: screenData.tabs,
        activeTab: activeTab
      })}
      <div class="aep-content-grid">
        <div class="aep-left-col">
          ${AppraisalEmployeeProfileComponents.PerformanceLevelCard(screenData.summary.level)}
          ${screenData.summary.listCards.map(function(card) {
            return AppraisalEmployeeProfileComponents.ListCard(card);
          }).join('')}
          ${AppraisalEmployeeProfileComponents.ConclusionCard(screenData.summary.conclusion)}
        </div>
        <div class="aep-right-col">
          ${screenData.sideCards.map(function(card) {
            return AppraisalEmployeeProfileComponents.StatusCard(card);
          }).join('')}
        </div>
      </div>
    `;
  }

  function bindEvents() {
    if (!root || root.__appraisalEmployeeProfileBound) return;

    root.addEventListener('click', function(event) {
      const tab = event.target.closest('[data-aep-tab]');
      if (!tab) return;

      activeTab = tab.getAttribute('data-aep-tab');
      render();
    });

    root.__appraisalEmployeeProfileBound = true;
  }

  document.addEventListener('DOMContentLoaded', function() {
    render();
    bindEvents();
  });
})();
</script>
</body>
</html>
