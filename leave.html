<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Leave (Time Off)</title>
  <meta name="description" content="Talento HR Platform – Leave Management" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Shared layout styles -->
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       LEAVE PAGE-SPECIFIC STYLES
       ═══════════════════════════════════════════════════════════════════════════ */

    /* Leave tabs */
    .leave-tab {
      display: inline-flex; align-items: center; gap: 5px;
      height: 28px; padding: 0 10px;
      border-radius: 6px;
      font-size: 12px; color: #4b405c;
      cursor: pointer; white-space: nowrap;
      transition: background 150ms;
      font-family: 'Alexandria', Helvetica, sans-serif;
      border: none; background: transparent;
    }
    .leave-tab:hover:not(.active) { background: rgba(236,233,239,.55); }
    .leave-tab.active {
      background: #fff;
      color: #1e1033;
      border: 1px solid #e8e7eb;
      box-shadow: 0 0.5px 1px rgba(30,16,51,0.15);
      font-weight: 500;
    }

    /* ─────────────────────────────────────────
       DATE NAV PILL (bordered)
    ───────────────────────────────────────── */
    .date-nav-pill {
      display: inline-flex; align-items: center; gap: 10px;
      height: 34px; padding: 0 12px;
      border: 1px solid #e8e7eb; border-radius: 999px;
      background: #F6F5F7;
      font-size: 13px; color: #4b405c;
    }
    .date-nav-pill button {
      display: flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      color: #4b405c; background: transparent; border: none;
      cursor: pointer; padding: 0; flex-shrink: 0;
    }
    .date-nav-pill .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #787085; flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       TOOLBAR BUTTONS
    ───────────────────────────────────────── */
    .toolbar-btn {
      display: inline-flex; align-items: center; gap: 5px;
      height: 32px; padding: 0 10px;
      border: 1px solid #e8e7eb; border-radius: 8px;
      font-size: 13px; color: #1e1033; background: #fff;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 0.5px 1px rgba(30,16,51,.12);
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .toolbar-btn:hover { background: #f5f3fb; }

    .filter-btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 12px;
      border: 1px solid #e8e7eb; border-radius: 999px;
      font-size: 13px; color: #1e1033; background: #fff;
      cursor: pointer; white-space: nowrap;
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .filter-btn:hover { background: #f5f3fb; }

    /* ─────────────────────────────────────────
       VIEW TOGGLE
    ───────────────────────────────────────── */
    .view-wrap {
      display: flex; align-items: center;
      background: #f6f5f7; border: 1px solid #e8e7eb;
      border-radius: 999px; padding: 2px; height: 32px;
    }
    .view-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; transition: background 150ms;
      border: none; background: transparent; color: #787085;
    }
    .view-btn.active {
      background: #fff; border: 1px solid #e8e7eb;
      box-shadow: 0 0.5px 1px rgba(30,16,51,.15); color: #1e1033;
    }
    .view-btn:not(.active):hover { background: rgba(236,233,239,.55); }

    /* ─────────────────────────────────────────
       TABLE
    ───────────────────────────────────────── */
    .leave-table { width: 100%; border-collapse: collapse; min-width: 780px; }

    .leave-table thead tr { border-bottom: 1px solid #f0eef6; background: #F6F5F7; }
    .leave-table th {
      padding: 8px 10px; text-align: left;
      font-size: 12px; font-weight: 400; color: #787085;
      letter-spacing: -0.12px; white-space: nowrap;
    }
    .leave-table th:first-child { padding-left: 14px; width: 220px; }
    .leave-table th.col-actions { width: 50px; }

    .leave-table tbody tr { border-bottom: 1px solid #f0eef6; transition: background 120ms; }
    .leave-table tbody tr:last-child { border-bottom: none; }
    .leave-table tbody tr:hover { background: #faf9fc; }

    .leave-table td {
      padding: 8px 10px; font-size: 13px; color: #1e1033; white-space: nowrap;
      vertical-align: middle;
    }
    .leave-table td:first-child { padding-left: 14px; }
    .leave-table td.col-actions { padding: 0 8px; text-align: center; }

    /* sort icon inline */
    .sort-icon { display: inline-block; vertical-align: middle; margin-left: 3px; }

    /* status badges */
    .badge-approved {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: #D7FFE7; color: #16a34a;
    }
    .badge-review {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 400;
      background: #f3f4f6; color: #6b7280;
    }

    /* duration pill */
    .duration-pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 400;
      background: #f3f4f6; color: #4b405c;
    }

    /* ─────────────────────────────────────────
       PAGINATION
    ───────────────────────────────────────── */
    .pg-wrap {
      display: flex; align-items: center; justify-content: flex-start;
      flex-wrap: wrap; gap: 8px;
      min-width: 0;
    }
    .pg-wrap > * { flex-shrink: 0; }
    .pg-nav-btn {
      display: inline-flex; align-items: center; gap: 4px;
      height: 30px; padding: 0 10px;
      border: 1px solid #e8e7eb; border-radius: 6px;
      font-size: 12px; color: #4b405c; background: #F6F5F7;
      cursor: pointer; font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .pg-nav-btn:hover { background: #f5f3fb; }
    .pg-pages-wrap {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap; justify-content: flex-start;
      background: #F6F5F7; border: 1px solid #e8e7eb; border-radius: 6px;
      padding: 3px 6px;
    }
    .pg-page-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 24px; height: 24px; padding: 0 6px;
      border: none; border-radius: 6px;
      font-size: 12px; color: #4b405c; background: transparent;
      cursor: pointer; font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }
    .pg-page-btn:hover:not(.pg-active) { background: #f5f3fb; }
    .pg-page-btn.pg-active {
      background: #fff; color: #1e1033; border: 1px solid #e8e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .pg-dots { font-size: 12px; color: #787085; padding: 0 2px; }

    /* ─────────────────────────────────────────
       MOBILE / RESPONSIVE HELPERS
    ───────────────────────────────────────── */

    /* table wrapper: horizontal scroll on small screens */
    .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll-wrap::-webkit-scrollbar { height: 4px; }
    .table-scroll-wrap::-webkit-scrollbar-thumb { background: #d2cfd6; border-radius: 4px; }

    /* header: allow wrapping */
    .page-header-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .tabs-config-wrap {
      display: flex; align-items: flex-start; flex-wrap: wrap; gap: 6px; justify-content: flex-start;
      min-width: 0;
    }
    .tabs-config-wrap > * { flex-shrink: 0; }

    /* toolbar: wraps on small screens */
    .toolbar-row {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .toolbar-right { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; justify-content: flex-start; }
    .toolbar-right > * { flex-shrink: 0; }

    /* pagination: stack on very small */
    @media (max-width: 480px) {
      .pg-wrap { justify-content: flex-start; gap: 4px; }
      .pg-nav-btn { padding: 0 8px; font-size: 11px; height: 28px; }
      .pg-page-btn { min-width: 22px; height: 22px; font-size: 11px; padding: 0 4px; }
    }

    /* shrink tab text a bit on tablets */
    @media (max-width: 900px) {
      .leave-tab { font-size: 11px; padding: 0 7px; }
    }
    @media (max-width: 680px) {
      .tabs-config-wrap { flex-direction: row; align-items: center; }
    }
    @media (max-width: 480px) {
      .leave-tab { font-size: 10px; padding: 0 6px; height: 26px; gap: 4px; }
      .leave-tab svg { width: 11px; height: 11px; }
      .toolbar-btn { font-size: 11px; padding: 0 8px; height: 28px; }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- OVERLAY (mobile) -->
  <div id="overlay" aria-hidden="true"></div>

  <!-- SIDEBAR (injected by layout.js) -->
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <!-- MAIN COLUMN -->
  <div id="main-col">

    <!-- NAVBAR (injected by layout.js) -->
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <!-- SCROLL AREA -->
    <div id="main-scroll">
      <div style="padding:16px;background:#f6f5f7;min-height:calc(100vh - 56px);">

        <!-- MAIN CONTENT CARD -->
        <div style="background:#fff;border-radius:20px;padding:20px 20px 24px;display:flex;flex-direction:column;gap:0;">

          <!-- PAGE HEADER (title + tabs + config) - Shared across all tabs -->
          <div class="page-header-row" style="margin-bottom:12px;">
            <h1 style="color:#1e1033;font-size:22px;font-weight:400;letter-spacing:-0.22px;line-height:1.4;flex-shrink:0;">Leave (Time off)</h1>
            <div class="tabs-config-wrap">
              <div id="main-tabs" style="display:flex;align-items:center;background:#f6f5f7;border:1.5px solid rgba(30,16,51,0.1);border-radius:8px;padding:2px;gap:0;flex-wrap:wrap;justify-content:flex-start;max-width:100%;"></div>
              <button class="toolbar-btn" style="gap:6px;border-radius:8px;">
                Configuration
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
            </div>
          </div>

          <!-- DYNAMIC TAB CONTENT CONTAINER (hidden by default) -->
          <div id="tab-content" style="display:none;">
            <!-- Content is dynamically rendered based on active tab -->
          </div>

          <!-- SUMMARY TAB CONTENT (default, initially visible) -->
          <div id="summary-content">
            <!-- Content will be dynamically rendered -->
          </div>
          <!-- /SUMMARY CONTENT -->

        </div>
        <!-- /MAIN CARD -->

      </div>
    </div>
    <!-- /SCROLL -->

  </div>
  <!-- /MAIN COL -->

</div>

<!-- Shared Layout Script -->
<script src="layout.js"></script>
<!-- Leave Components Library -->
<script src="leave_components.js"></script>

<!-- Page-specific scripts -->
<script>
// Tab definitions for Leave module
const leaveTabs = [
  { id: 'summary', label: 'Summary', icon: 'sparkle' },
  { id: 'leave-reconciliations', label: 'Leave reconciliations', icon: 'table' },
  { id: 'return-from-leave', label: 'Return from leave', icon: 'return' },
  { id: 'reports', label: 'Reports', icon: 'document' }
];

let activeTabId = 'summary';

// Initialize tabs on page load
document.addEventListener('DOMContentLoaded', function() {
  renderMainTabs();
  // Initialize Summary tab content
  renderDynamicTabContent('summary');
});

// Render main navigation tabs
function renderMainTabs() {
  const tabsContainer = document.getElementById('main-tabs');
  if (!tabsContainer) return;

  const Icons = LeaveComponents.Icons;
  const tabIcons = {
    'summary': Icons.sparkle,
    'leave-reconciliations': Icons.table,
    'return-from-leave': Icons.return,
    'reports': Icons.document
  };

  const tabsHTML = leaveTabs.map(tab => {
    const isActive = tab.id === activeTabId;
    const icon = tabIcons[tab.id] || '';
    return `
      <button class="leave-tab${isActive ? ' active' : ''}" 
              data-tab-id="${tab.id}"
              onclick="handleMainTabClick(this, '${tab.id}')">
        ${icon}
        ${tab.label}
      </button>
    `;
  }).join('');

  tabsContainer.innerHTML = tabsHTML;
}

// Handle main tab click
function handleMainTabClick(el, tabId) {
  // Update active state on tabs
  document.querySelectorAll('#main-tabs .leave-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTabId = tabId;

  // Show/hide appropriate content
  const summaryContent = document.getElementById('summary-content');
  const tabContent = document.getElementById('tab-content');

  if (tabId === 'summary') {
    // Show summary, hide dynamic content
    summaryContent.style.display = 'block';
    tabContent.style.display = 'none';
    // Render summary content dynamically
    renderDynamicTabContent(tabId);
  } else {
    // Hide summary, render dynamic content
    summaryContent.style.display = 'none';
    tabContent.style.display = 'block';
    renderDynamicTabContent(tabId);
  }
}

// Track active sub-tab for reports
let activeReportsSubTab = 'analysis-view';

// Render dynamic tab content based on tab ID
function renderDynamicTabContent(tabId, subTabId = null) {
  const container = document.getElementById('tab-content');
  const summaryContainer = document.getElementById('summary-content');
  
  if (!container) return;

  const config = LeaveComponents.TabConfigs[tabId];
  if (!config) {
    container.innerHTML = LeaveComponents.EmptyState({
      title: 'Coming soon',
      description: 'This feature is under development.'
    });
    return;
  }

  // Determine which sub-tab config to use
  let activeSubTabId = subTabId || config.activeSubTab || (config.subTabs && config.subTabs[0]?.id);
  let effectiveConfig = config;
  
  // If this tab has sub-tab specific configs, merge them
  if (config.subTabConfigs && activeSubTabId && config.subTabConfigs[activeSubTabId]) {
    const subConfig = config.subTabConfigs[activeSubTabId];
    effectiveConfig = {
      ...config,
      ...subConfig,
      subTabs: config.subTabs, // Keep sub-tabs from parent
      activeSubTab: activeSubTabId
    };
  }

  let html = '';

  // Sub-tabs (if configured)
  if (config.subTabs && config.subTabs.length > 0) {
    html += LeaveComponents.SubTabs({
      tabs: config.subTabs,
      activeTab: activeSubTabId,
      onTabChange: 'handleSubTabSwitch'
    });
  }

  // Section header (if configured)
  if (effectiveConfig.sectionHeader) {
    html += LeaveComponents.SectionHeader(effectiveConfig.sectionHeader);
  }

  // Toolbar (if configured)
  if (effectiveConfig.toolbar) {
    html += LeaveComponents.Toolbar(effectiveConfig.toolbar);
  }

  // Empty state (if configured)
  if (effectiveConfig.emptyState) {
    html += LeaveComponents.EmptyState(effectiveConfig.emptyState);
  }
  // Data table (if columns and data configured)
  else if (effectiveConfig.columns && effectiveConfig.columns.length > 0 && effectiveConfig.sampleData) {
    html += LeaveComponents.renderReconciliationTable(effectiveConfig);
  }

  // Pagination (conditional)
  if (effectiveConfig.showPagination !== false && effectiveConfig.sampleData && effectiveConfig.sampleData.length > 0) {
    html += LeaveComponents.Pagination({ currentPage: 1, totalPages: 30 });
  }

  // Render in appropriate container
  if (tabId === 'summary' && summaryContainer) {
    summaryContainer.innerHTML = html;
  } else {
    container.innerHTML = html;
  }
}

// Handle sub-tab switching (for Reports tab and others)
function handleSubTabSwitch(subtabId) {
  console.log('Sub-tab switched to:', subtabId);
  
  // Update active sub-tab tracker
  activeReportsSubTab = subtabId;
  
  // Re-render the current main tab with the new sub-tab
  renderDynamicTabContent(activeTabId, subtabId);
}

/* View toggle */
function switchView(el) {
  document.querySelectorAll('.view-btn').forEach(function (b) { b.classList.remove('active'); });
  el.classList.add('active');
}

/* Pagination */
function pgSelect(el) {
  document.querySelectorAll('.pg-page-btn').forEach(function (b) { b.classList.remove('pg-active'); });
  el.classList.add('pg-active');
}
</script>
</body>
</html>
