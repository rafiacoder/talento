<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Performance evaluation</title>
  <meta name="description" content="Talento HR Platform - Performance evaluation" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    .pe-page-wrap {
      padding: 16px;
      background: #f6f5f7;
      min-height: calc(100vh - 56px);
    }

    .pe-screen-card {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 24px;
      padding: 22px 18px 28px;
      min-height: 640px;
    }

    .pe-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .pe-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .pe-title {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
      letter-spacing: -0.2px;
    }

    .pe-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pe-toolbar-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      font-size: 14px;
      color: #1e1033;
      background: #fff;
      box-shadow: none;
      gap: 8px;
    }

    .pe-toolbar-btn:hover {
      background: #f7f5fb;
    }

    .pe-toolbar-btn--strong {
      font-weight: 500;
    }

    .pe-tabs-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0eef6;
    }

    .pe-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 0 10px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      font-size: 14px;
      line-height: 1.4;
      color: #787085;
      transition: color 150ms, border-color 150ms;
      white-space: nowrap;
    }

    .pe-tab:hover {
      color: #4b405c;
    }

    .pe-tab.active {
      color: #1e1033;
      font-weight: 500;
      border-bottom-color: #1e1033;
    }

    .pe-toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .pe-search-box {
      width: 100%;
      max-width: 330px;
      min-width: 240px;
      height: 40px;
      background: #fff;
      flex: 1;
    }

    .pe-search-box input {
      font-size: 14px;
      color: #4b405c;
    }

    .pe-filter-btn {
      height: 38px;
      padding: 0 18px 0 16px;
      border-radius: 999px;
      background: #fff;
      font-size: 14px;
      color: #1e1033;
      gap: 10px;
      flex-shrink: 0;
    }

    .pe-filter-btn:hover {
      background: #f7f5fb;
    }

    .pe-filter-count {
      color: #a09aab;
      font-size: 14px;
    }

    .pe-table-container {
      border-radius: 16px;
    }

    .pe-data-table {
      min-width: 1080px;
    }

    .pe-data-table th {
      padding: 12px 16px;
      font-size: 12px;
    }

    .pe-data-table th:first-child,
    .pe-data-table td:first-child {
      padding-left: 12px;
    }

    .pe-data-table td {
      padding: 14px 16px;
      font-size: 14px;
      white-space: nowrap;
    }

    .pe-checkbox-head,
    .pe-checkbox-cell {
      width: 42px;
      text-align: center;
      padding-right: 8px;
    }

    .pe-data-table .table-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid #ddd8e5;
      border-radius: 4px;
      background: #fff;
      display: inline-block;
      position: relative;
      cursor: pointer;
      margin: 0;
      vertical-align: middle;
    }

    .pe-data-table .table-checkbox:hover {
      border-color: #c9c0d8;
    }

    .pe-data-table .table-checkbox:checked {
      border-color: #1e1033;
      background: #1e1033;
    }

    .pe-data-table .table-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .pe-data-table .table-checkbox:indeterminate {
      border-color: #1e1033;
      background: #1e1033;
    }

    .pe-data-table .table-checkbox:indeterminate::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 6px;
      width: 8px;
      height: 2px;
      border-radius: 999px;
      background: #fff;
    }

    .pe-name {
      font-size: 14px;
      font-weight: 500;
      color: #1e1033;
    }

    .pe-status-badge {
      font-weight: 500;
    }

    .pe-status-badge--completed {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: var(--badge-radius);
      font-size: var(--badge-font-size);
      font-weight: 500;
      color: #7a58c1;
      background: #efe9ff;
    }

    .pe-participants-cell {
      min-width: 116px;
    }

    .pe-participants-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .pe-participants-count {
      font-size: 14px;
      color: #4b405c;
    }

    .pe-participants-percent {
      font-size: 14px;
      color: #787085;
    }

    .pe-progress-track {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: #ece9ef;
      overflow: hidden;
    }

    .pe-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #8b5cf6 0%, #c084fc 100%);
    }

    .pe-frequency {
      font-size: 14px;
      color: #1e1033;
    }

    .pe-row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .pe-row-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #e8e7eb;
      background: #fff;
      color: #1e1033;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .pe-row-action-btn--secondary:hover {
      background: #f7f5fb;
    }

    .pe-row-action-btn--primary {
      background: #1e1033;
      border-color: #1e1033;
      color: #fff;
    }

    .pe-row-action-btn--primary svg {
      color: #2cf7b3;
      stroke: #2cf7b3;
    }

    .pe-more-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #ece9ef;
      border-radius: 10px;
      background: #fff;
      color: #787085;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms, color 150ms;
    }

    .pe-more-btn:hover {
      background: #f7f5fb;
      color: #4b405c;
    }

    .pe-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 20px;
      border: 1px dashed #e8e7eb;
      border-radius: 16px;
      background: #fbfafc;
      text-align: center;
    }

    .pe-empty-state h2 {
      margin-bottom: 8px;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
    }

    .pe-empty-state p {
      max-width: 380px;
      font-size: 14px;
      line-height: 1.5;
      color: #787085;
    }

    @media (max-width: 900px) {
      .pe-screen-card {
        min-height: auto;
      }

      .pe-header-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .pe-header-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 680px) {
      .pe-page-wrap {
        padding: 14px 10px 24px;
      }

      .pe-screen-card {
        border-radius: 20px;
        padding: 18px 14px 22px;
      }

      .pe-toolbar-row {
        align-items: stretch;
        flex-direction: column;
      }

      .pe-search-box {
        max-width: none;
      }

      .pe-filter-btn {
        align-self: flex-start;
        min-height: 40px;
        padding: 0 18px;
      }

      .pe-tabs-bar {
        gap: 12px;
      }

      .pe-tab {
        padding-bottom: 8px;
      }
    }

    @media (max-width: 480px) {
      .pe-toolbar-btn,
      .pe-row-action-btn {
        font-size: 13px;
        min-height: 38px;
        padding: 0 14px;
      }

      .pe-filter-btn {
        font-size: 14px;
        min-height: 40px;
        padding: 0 18px;
      }

      .pe-data-table td {
        padding: 12px 14px;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <div id="main-scroll">
      <div class="pe-page-wrap">
        <div class="pe-screen-card">
          <div id="performance-evaluation-root" class="pe-screen"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="performance_evaluation_components.js"></script>
<script>
(function() {
  'use strict';

  const screenData = {
    title: 'Performance evaluation',
    actions: [
      { text: 'Templates', icon: 'arrowUpRight', action: 'templates' },
      { text: 'Export all', icon: 'download', action: 'export' },
      { text: 'Create new evaluation', icon: 'plus', action: 'create', className: 'pe-toolbar-btn--strong' }
    ],
    tabs: [
      { id: 'all', label: 'All appraisals', icon: 'allAppraisals' },
      { id: 'active', label: 'Active', icon: 'activeStatus' },
      { id: 'draft', label: 'Drafts', icon: 'pencil' },
      { id: 'completed', label: 'Completed', icon: 'completedStatus' }
    ],
    filtersCount: 2,
    columns: [
      { label: '', width: '42px', type: 'checkbox' },
      { label: 'Evaluation name', width: '250px' },
      { label: 'Status', width: '120px' },
      { label: 'Participants', width: '170px' },
      { label: 'Evaluation from', width: '150px' },
      { label: 'Evaluation To', width: '150px' },
      { label: 'Frequency', width: '190px' },
      { label: 'Actions', width: '180px' }
    ],
    evaluations: [
      {
        id: 1,
        name: 'Q3 marketing team',
        status: 'draft',
        participants: { current: 32, percent: 0 },
        evaluationFrom: '12 Dec 2026',
        evaluationTo: '29 Dec 2026',
        frequency: 'One-time evaluation',
        action: { label: 'Edit', variant: 'secondary', icon: 'pencil' }
      },
      {
        id: 2,
        name: '360 evaluation - full year',
        status: 'active',
        participants: { current: 40, total: 56, percent: 82 },
        evaluationFrom: '12 Dec 2026',
        evaluationTo: '29 Dec 2026',
        frequency: 'Annually',
        action: { label: 'View', variant: 'primary', icon: 'arrowUpRight' }
      },
      {
        id: 3,
        name: 'Product team performance',
        status: 'completed',
        participants: { current: 22, total: 22, percent: 100 },
        evaluationFrom: '12 Dec 2026',
        evaluationTo: '29 Dec 2026',
        frequency: 'Annually',
        action: { label: 'View', variant: 'primary', icon: 'arrowUpRight' }
      }
    ]
  };

  let activeTab = 'all';
  let searchValue = '';

  const root = document.getElementById('performance-evaluation-root');

  function getFilteredEvaluations() {
    return screenData.evaluations.filter(function(evaluation) {
      const matchesTab = activeTab === 'all' || evaluation.status === activeTab;
      const haystack = [
        evaluation.name,
        evaluation.frequency,
        evaluation.evaluationFrom,
        evaluation.evaluationTo
      ].join(' ').toLowerCase();
      const matchesSearch = !searchValue || haystack.indexOf(searchValue.toLowerCase()) !== -1;
      return matchesTab && matchesSearch;
    });
  }

  function renderTabs() {
    const tabsRegion = document.getElementById('pe-tabs-region');
    if (!tabsRegion) return;

    tabsRegion.innerHTML = PerformanceEvaluationComponents.AppraisalTabs({
      tabs: screenData.tabs,
      activeTab: activeTab
    });
  }

  function renderToolbar() {
    const toolbarRegion = document.getElementById('pe-toolbar-region');
    if (!toolbarRegion) return;

    toolbarRegion.innerHTML = PerformanceEvaluationComponents.SearchToolbar({
      searchPlaceholder: 'Search',
      searchValue: searchValue,
      filtersCount: screenData.filtersCount
    });
  }

  function renderTable() {
    const tableRegion = document.getElementById('pe-table-region');
    if (!tableRegion) return;

    tableRegion.innerHTML = PerformanceEvaluationComponents.EvaluationTable({
      columns: screenData.columns,
      rows: getFilteredEvaluations()
    });

    syncHeaderCheckbox();
  }

  function bindEvents() {
    if (root.__performanceEvaluationBound) return;

    root.addEventListener('click', function(event) {
      const tabButton = event.target.closest('[data-evaluation-tab]');
      if (tabButton) {
        activeTab = tabButton.getAttribute('data-evaluation-tab');
        renderTabs();
        renderTable();
      }
    });

    root.addEventListener('input', function(event) {
      if (!event.target.matches('[data-evaluation-search]')) return;
      searchValue = event.target.value.trim();
      renderTable();
    });

    root.addEventListener('change', function(event) {
      if (event.target.matches('[data-evaluation-select-all]')) {
        const rowChecks = root.querySelectorAll('[data-evaluation-row-check]');
        rowChecks.forEach(function(checkbox) {
          checkbox.checked = event.target.checked;
        });
        syncHeaderCheckbox();
        return;
      }

      if (event.target.matches('[data-evaluation-row-check]')) {
        syncHeaderCheckbox();
      }
    });

    root.__performanceEvaluationBound = true;
  }

  function syncHeaderCheckbox() {
    const selectAll = root.querySelector('[data-evaluation-select-all]');
    const rowChecks = Array.from(root.querySelectorAll('[data-evaluation-row-check]'));

    if (!selectAll) return;
    if (!rowChecks.length) {
      selectAll.checked = false;
      selectAll.indeterminate = false;
      return;
    }

    const checkedCount = rowChecks.filter(function(checkbox) {
      return checkbox.checked;
    }).length;

    selectAll.checked = checkedCount === rowChecks.length;
    selectAll.indeterminate = checkedCount > 0 && checkedCount < rowChecks.length;
  }

  function renderScreen() {
    if (!root) return;

    root.innerHTML = `
      ${PerformanceEvaluationComponents.PageHeader({
        title: screenData.title,
        actions: screenData.actions
      })}
      <div id="pe-tabs-region"></div>
      <div id="pe-toolbar-region"></div>
      <div id="pe-table-region"></div>
    `;

    renderTabs();
    renderToolbar();
    renderTable();
    bindEvents();
  }

  document.addEventListener('DOMContentLoaded', renderScreen);
})();
</script>
</body>
</html>
