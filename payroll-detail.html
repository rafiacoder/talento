<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Payroll Detail</title>
  <meta name="description" content="Talento HR Platform – Payroll Detail View" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Shared layout styles -->
  <link rel="stylesheet" href="shared-styles.css" />
  <!-- Design Tokens -->
  <script src="design-tokens.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       PAYROLL DETAIL PAGE-SPECIFIC STYLES
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────
       BREADCRUMB
    ───────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: #787085;
      margin-bottom: 16px;
    }

    .breadcrumb a {
      color: #787085;
      text-decoration: none;
      transition: color 150ms;
    }

    .breadcrumb a:hover {
      color: #4b405c;
    }

    .breadcrumb-current {
      color: #1e1033;
    }

    /* ─────────────────────────────────────────
       PAGE HEADER
    ───────────────────────────────────────── */
    .detail-page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-header-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-page-title {
      font-size: 24px;
      font-weight: 400;
      color: #1e1033;
      letter-spacing: -0.24px;
      line-height: 1.3;
    }

    .detail-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 14px;
      color: #787085;
    }

    .detail-meta-separator {
      color: #a09aab;
    }

    .detail-creator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-creator-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .detail-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #1e1033;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Alexandria', Helvetica, sans-serif;
      transition: background 150ms;
    }

    .download-btn:hover {
      background: #f5f3fb;
    }

    .primary-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #1E1033;
      cursor: pointer;
      transition: all 150ms;
      border: none;
      white-space: nowrap;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .primary-action-btn svg {
      stroke: #2CF7B3;
    }

    .primary-action-btn:hover {
      background: #2a1745;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 16, 51, 0.25);
    }

    .more-actions-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid #e8e7eb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background 150ms;
    }

    .more-actions-btn:hover {
      background: #f5f3fb;
    }

    /* ─────────────────────────────────────────
       STATS ROW (Reusable Stat Cards)
    ───────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 12px;
      min-width: 160px;
      min-height: 80px;
      flex: 1;
    }

    .stat-card-header {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .stat-card-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #787085;
      flex-shrink: 0;
    }

    .stat-card-label {
      font-size: 13px;
      color: #787085;
    }

    .stat-card-value {
      font-size: 14px;
      font-weight: 500;
      color: #1e1033;
      margin-top: auto;
    }

    .stat-card-value.positive {
      color: #15803d;
    }

    .stat-card-value.negative {
      color: #dc2626;
    }

    /* Employees stat card with avatars */
    .stat-card-employees {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    /* ─────────────────────────────────────────
       TABLE TOOLBAR
    ───────────────────────────────────────── */
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .table-toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 200px;
    }

    .table-toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .table-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 100px;
      padding: 0 16px;
      height: 36px;
      min-width: 200px;
      max-width: 280px;
    }

    .table-search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #4b405c;
      width: 100%;
    }

    .table-search-box input::placeholder {
      color: #a09aab;
    }

    .toolbar-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      font-size: 14px;
      color: #4b405c;
      cursor: pointer;
      transition: all 150ms;
      white-space: nowrap;
      border: 1px solid #e8e7eb;
      border-radius: 100px;
      background: #fff;
    }

    .toolbar-link:hover {
      background: #f5f3fb;
    }

    .toolbar-link svg {
      width: 14px;
      height: 14px;
    }

    /* ─────────────────────────────────────────
       EMPLOYEE TABLE
    ───────────────────────────────────────── */
    .employee-name-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .employee-name {
      font-size: 14px;
      font-weight: 400;
      color: #1e1033;
    }

    .employee-subtitle {
      font-size: 12px;
      color: #787085;
    }

    /* Status badge for payroll */
    .badge-need-review {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 400;
      background: #f3f4f6;
      color: #6b7280;
    }

    .badge-reviewed {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 400;
      background: #D7FFE7;
      color: #15803d;
    }

    .badge-active {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 400;
      background: #D7FFE7;
      color: #15803d;
    }

    /* ─────────────────────────────────────────
       PAGINATION INFO
    ───────────────────────────────────────── */
    .pagination-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #787085;
    }

    .pagination-info span {
      display: inline-flex;
      align-items: center;
    }

    .pagination-arrow {
      font-size: 18px;
      font-weight: 300;
      cursor: pointer;
    }

    .pagination-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pagination-nav a {
      color: #4b405c;
      text-decoration: none;
      transition: color 150ms;
    }

    .pagination-nav a:hover {
      color: #1e1033;
    }

    /* Table header with two-line layout */
    .table-header-people {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .table-header-people-count {
      font-weight: 500;
      color: #1e1033;
      font-size: 12px;
    }

    .table-header-people-subtitle {
      font-weight: 300;
      color: #a09aab;
      font-size: 11px;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE DESIGN
    ───────────────────────────────────────── */
    @media (max-width: 1024px) {
      .stats-row {
        flex-wrap: wrap;
      }

      .stat-card {
        min-width: calc(50% - 8px);
        flex: none;
      }
    }

    @media (max-width: 768px) {
      .detail-page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .detail-header-right {
        width: 100%;
        justify-content: flex-start;
      }

      .table-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .table-toolbar-left {
        width: 100%;
      }

      .table-search-box {
        max-width: none;
        flex: 1;
      }

      .table-toolbar-right {
        width: 100%;
        justify-content: flex-end;
      }
    }

    @media (max-width: 640px) {
      .stat-card {
        min-width: 100%;
      }

      .detail-meta-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .detail-meta-separator {
        display: none;
      }
    }

    /* ─────────────────────────────────────────
       ACTIVITIES PANEL STYLES
    ───────────────────────────────────────── */
    .activities-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      transition: all 300ms ease;
    }

    .activities-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .activities-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 420px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
      z-index: 51;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 300ms ease;
    }

    .activities-panel.open {
      transform: translateX(0);
    }

    .activities-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0eef6;
      flex-shrink: 0;
    }

    .activities-panel-title {
      font-size: 18px;
      font-weight: 500;
      color: #1e1033;
    }

    .activities-close-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      color: #787085;
      cursor: pointer;
      transition: all 150ms;
      border: none;
      background: transparent;
    }

    .activities-close-btn:hover {
      background: #f6f5f7;
      color: #1e1033;
    }

    .activities-tabs {
      display: flex;
      gap: 0;
      padding: 0 24px;
      border-bottom: 1px solid #f0eef6;
      flex-shrink: 0;
    }

    .activities-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 14px;
      color: #787085;
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 150ms;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .activities-tab:hover {
      color: #4b405c;
    }

    .activities-tab.active {
      color: #1e1033;
      border-bottom-color: #1e1033;
    }

    .activities-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .activities-content::-webkit-scrollbar {
      width: 4px;
    }

    .activities-content::-webkit-scrollbar-thumb {
      background: #d2cfd6;
      border-radius: 4px;
    }

    /* Activity Item */
    .activity-item {
      display: flex;
      gap: 12px;
      padding-bottom: 20px;
    }

    .activity-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .activity-content {
      flex: 1;
      min-width: 0;
    }

    .activity-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .activity-name {
      font-size: 14px;
      font-weight: 500;
      color: #1e1033;
    }

    .activity-date {
      font-size: 12px;
      color: #a09aab;
    }

    .activity-badge-rejected {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: #fee2e2;
      color: #dc2626;
    }

    .activity-badge-approved {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: #D7FFE7;
      color: #15803d;
    }

    .activity-text {
      font-size: 13px;
      color: #4b405c;
      line-height: 1.5;
    }

    .activity-change {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #4b405c;
      background: #f6f5f7;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .activity-change-label {
      color: #787085;
    }

    .activity-signature {
      margin-top: 12px;
      padding: 16px;
      background: #faf9fc;
      border-radius: 8px;
      border: 1px solid #f0eef6;
    }

    .activity-signature img {
      max-width: 100%;
      height: auto;
    }

    /* Today Divider */
    .activity-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
    }

    .activity-divider-line {
      flex: 1;
      height: 1px;
      background: #e8e7eb;
    }

    .activity-divider-text {
      font-size: 12px;
      color: #787085;
      background: #fff;
      padding: 0 8px;
    }

    /* Other Section */
    .activities-other {
      border-top: 1px solid #f0eef6;
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .activities-other-title {
      font-size: 15px;
      font-weight: 500;
      color: #1e1033;
      margin-bottom: 12px;
    }

    .activities-other-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 1px solid #f0eef6;
    }

    .activities-other-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 13px;
      color: #787085;
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 150ms;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .activities-other-tab:hover {
      color: #4b405c;
    }

    .activities-other-tab.active {
      color: #1e1033;
      border-bottom-color: #1e1033;
    }

    .file-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
    }

    .file-info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .file-info-label {
      font-size: 12px;
      color: #787085;
    }

    .file-info-value {
      font-size: 13px;
      color: #1e1033;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-info-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }

    @media (max-width: 480px) {
      .activities-panel {
        max-width: 100%;
      }

      .activities-panel-header,
      .activities-tabs,
      .activities-content,
      .activities-other {
        padding-left: 16px;
        padding-right: 16px;
      }

      .file-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<!-- APP SHELL -->
<div id="app">
  <!-- Sidebar (injected by layout.js) -->
  <aside id="sidebar"></aside>

  <!-- Overlay for mobile menu -->
  <div id="overlay"></div>

  <!-- Main column (navbar + content) -->
  <div id="main-col">

    <!-- Top navbar (injected by layout.js) -->
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 16px;border-bottom:1px solid #e8e7eb;flex-shrink:0;background:#fff;"></header>

    <!-- Scrollable main content -->
    <main id="main-scroll" style="padding:24px 20px 40px;">
      
      <!-- Page Content Container -->
      <div id="payroll-detail-content">
        <!-- Content will be rendered by JavaScript -->
      </div>

    </main>
  </div>
</div>

<!-- Activities Panel Overlay -->
<div id="activities-overlay" class="activities-overlay" onclick="closeActivitiesPanel()"></div>

<!-- Activities Panel -->
<div id="activities-panel" class="activities-panel">
  <!-- Panel will be rendered by JavaScript -->
</div>

<!-- Layout JS (sidebar & navbar) -->
<script src="layout.js"></script>

<!-- Payroll Components -->
<script src="payroll_components.js"></script>

<!-- Page Initialization -->
<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════════════════════════
  // ICONS
  // ═══════════════════════════════════════════════════════════════════════════
  const Icons = {

    filter: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>`,
    check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,

  function renderActivitiesPanel() {
    const panel = document.getElementById('activities-panel');
    if (!panel) return;

    // Generate activities HTML
    const activitiesHTML = activitiesData.map(activity => {
      if (activity.type === 'divider') {
        return `
          <div class="activity-divider">
            <div class="activity-divider-line"></div>
            <span class="activity-divider-text">${activity.text}</span>
            <div class="activity-divider-line"></div>

      }

      let badgeHTML = '';
      if (activity.badge === 'rejected') {
        badgeHTML = `<span class="activity-badge-rejected">${activity.badgeText}</span>`;
      } else if (activity.badge === 'approved') {
        badgeHTML = `<span class="activity-badge-approved">${activity.badgeText}</span>`;
      }

      let contentHTML = '';
      if (activity.text) {
        contentHTML = `<p class="activity-text">${badgeHTML} ${activity.text}</p>`;
      }

      if (activity.change) {
        const fieldsHTML = activity.change.fields.map(f => 
          `<span><strong>${f.label}</strong> ${f.value}</span>`
        ).join(' ');
        contentHTML = `
          <div class="activity-change">
            <span class="activity-change-label">${activity.change.label}</span>
            ${fieldsHTML}
          </div>
        `;
      }

      let signatureHTML = '';
      if (activity.hasSignature) {
        signatureHTML = `
          <div class="activity-signature">
            <svg width="120" height="60" viewBox="0 0 120 60">
              <path d="M10 45 Q20 20, 35 35 T55 30 T75 40 T95 25 T110 35" stroke="#1e1033" stroke-width="2" fill="none"/>
              <path d="M25 50 Q35 45, 45 50" stroke="#1e1033" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
        `;
      }

      return `
        <div class="activity-item">
          <img src="${activity.avatar}" alt="${activity.name}" class="activity-avatar" />
          <div class="activity-content">
            <div class="activity-header">
              <span class="activity-name">${activity.name}</span>
              <span class="activity-date">${activity.date}</span>
            </div>
            ${contentHTML}
            ${signatureHTML}
          </div>

  /**
   * Breadcrumb Component
   */
  function Breadcrumb(config) {
    const { items = [] } = config;
    
    return `
      <nav class="breadcrumb">
        ${items.map((item, idx) => {
          const isLast = idx === items.length - 1;
          if (isLast) {
            return `<span class="breadcrumb-current">${item.label}</span>`;
          }
          return `<a href="${item.href}">${item.label}</a><span>/</span>`;
        }).join('')}
      </nav>
    `;
  }

  /**
   * Status Badge Component
   */
  function StatusBadge(config) {
    const { status = 'draft' } = config;
    const statusConfig = {
      draft: { bg: '#F6F5F7', text: '#6B7280', label: 'Draft' },
      done: { bg: '#EDF8F3', text: '#15803D', label: 'Done' },
      unpaid: { bg: '#F9F1F3', text: '#DC2626', label: 'Unpaid' },
      pending: { bg: '#FEF3C7', text: '#B45309', label: 'Pending' }
    };
    const conf = statusConfig[status] || statusConfig.draft;
    
    return `<span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:100px;font-size:12px;font-weight:500;background:${conf.bg};color:${conf.text};">${conf.label}</span>`;
  }

  /**
   * Stat Card Component - Reusable for displaying statistics
   * @param {Object} config - { icon, label, value, valueClass }
   */
  function StatCard(config) {
    const { icon, label, value, valueClass = '' } = config;
    
    return `
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">${icon}</span>
          <span class="stat-card-label">${label}</span>
        </div>
        <span class="stat-card-value ${valueClass}">${value}</span>
      </div>
    `;
  }

  /**
   * Stat Card with Employees (includes avatars)
   */
  function StatCardEmployees(config) {
    const { icon, label, current, total, avatars = [] } = config;
    
    const avatarsHTML = avatars.slice(0, 3).map((avatar, idx) => {
      const offset = idx * 18;
      return `<img src="${avatar}" alt="Employee" style="width:28px;height:28px;border-radius:50%;border:2px solid #fff;object-fit:cover;position:absolute;left:${offset}px;z-index:${3 - idx};" />`;
    }).join('');
    
    const avatarWidth = avatars.length > 0 ? (avatars.length - 1) * 18 + 28 : 0;
    
    return `
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">${icon}</span>
          <span class="stat-card-label">${label}</span>
        </div>
        <div class="stat-card-employees">
          <span class="stat-card-value"><span style="font-weight:500;">${current}</span>/<span style="color:#787085;">${total}</span></span>
          <div style="position:relative;height:28px;width:${avatarWidth}px;">
            ${avatarsHTML}
          </div>
        </div>
      </div>
    `;
  }

  /**
   * Avatar Group Component
   */
  function AvatarGroup(config) {
    const { avatars = [], maxShow = 3, size = 28 } = config;
    const visibleAvatars = avatars.slice(0, maxShow);
    
    const avatarsHTML = visibleAvatars.map((avatar, idx) => {
      const offset = idx * (size * 0.65);
      return `<img src="${avatar}" alt="Employee" style="width:${size}px;height:${size}px;border-radius:50%;border:2px solid #fff;object-fit:cover;position:absolute;left:${offset}px;z-index:${maxShow - idx};" />`;
    }).join('');
    
    const totalWidth = visibleAvatars.length > 0 ? (visibleAvatars.length - 1) * (size * 0.65) + size : 0;
    
    return `
      <div style="position:relative;height:${size}px;width:${totalWidth}px;">
        ${avatarsHTML}
      </div>
    `;
  }
