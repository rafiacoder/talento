<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Appraisal Employee profile evaluators</title>
  <meta name="description" content="Talento HR Platform - Appraisal employee profile evaluators" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll {
      background: #f6f5f7;
    }

    .aep-page-wrap {
      padding: 16px;
      min-height: calc(100vh - 56px);
    }

    .aep-page-inner {
      max-width: 1400px;
      margin: 0 auto;
    }

    .aep-screen-card {
      background: #ffffff;
      border: 1px solid #ece9ef;
      border-radius: 24px;
      padding: 18px 18px 20px;
      box-shadow: 0 10px 24px rgba(30, 16, 51, 0.04);
    }

    .aep-screen {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .aep-header {
      display: grid;
      gap: 16px;
      padding-bottom: 2px;
      align-content: start;
    }

    .aep-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .aep-breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 14px;
      line-height: 1.4;
      color: #787085;
    }

    .aep-breadcrumb-item--current {
      color: #4b405c;
    }

    .aep-breadcrumb-divider {
      color: #b0a9bb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aep-pager {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .aep-pager-btn {
      border: none;
      background: transparent;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.4;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
    }

    .aep-pager-progress {
      font-size: 14px;
      line-height: 1.4;
      color: #4b405c;
      font-weight: 500;
    }

    .aep-profile-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .aep-profile-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 560px;
    }

    .aep-profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e7e1f2;
      box-shadow: 0 8px 16px rgba(30, 16, 51, 0.1);
      flex-shrink: 0;
      background: #f3edf9;
    }

    .aep-profile-copy {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .aep-profile-name {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
      letter-spacing: -0.2px;
    }

    .aep-profile-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 14px;
      line-height: 1.45;
      color: #787085;
    }

    .aep-meta-sep {
      color: #b0a9bb;
    }

    .aep-state-pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .aep-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .aep-edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid #1e1033;
      background: #1e1033;
      color: #ffffff;
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      box-shadow: 0 10px 18px rgba(30, 16, 51, 0.2);
      white-space: nowrap;
    }

    .aep-edit-btn svg {
      stroke: #2cf7b3;
      color: #2cf7b3;
    }

    .aep-more-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid #ece9ef;
      background: #ffffff;
      color: #8b8499;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aep-tabs {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #ece9ef;
      padding-bottom: 10px;
    }

    .aep-tab {
      border: none;
      background: transparent;
      color: #787085;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 0 9px;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
      transition: color 150ms ease, border-color 150ms ease;
    }

    .aep-tab.active {
      color: #1e1033;
      border-bottom-color: #1e1033;
      font-weight: 500;
    }

    .aep-tab-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .aepe-table-wrap {
      border-radius: 16px;
      border: 1px solid #ece9ef;
      overflow: hidden;
      background: #ffffff;
    }

    .aepe-table {
      min-width: 980px;
    }

    .aepe-table thead tr {
      background: #f6f5f7;
    }

    .aepe-table th {
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 400;
      color: #8b8499;
      text-align: left;
      white-space: nowrap;
    }

    .aepe-table td {
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.4;
      color: #1e1033;
      white-space: nowrap;
      border-top: 1px solid #f0edf5;
      vertical-align: middle;
    }

    .aepe-checkbox-head,
    .aepe-checkbox-cell {
      width: 34px;
      text-align: center;
      padding-right: 6px;
    }

    .aepe-table-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid #ddd8e5;
      border-radius: 4px;
      background: #ffffff;
      display: inline-block;
      position: relative;
      cursor: pointer;
      margin: 0;
      vertical-align: middle;
    }

    .aepe-table-checkbox:checked {
      border-color: #1e1033;
      background: #1e1033;
    }

    .aepe-table-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #ffffff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .aepe-table-checkbox:indeterminate {
      border-color: #1e1033;
      background: #1e1033;
    }

    .aepe-table-checkbox:indeterminate::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 6px;
      width: 8px;
      height: 2px;
      border-radius: 999px;
      background: #ffffff;
    }

    .aepe-member-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .aepe-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e9e4f1;
      background: #f1ecf8;
      flex-shrink: 0;
    }

    .aepe-member-name {
      font-size: 14px;
      line-height: 1.35;
      color: #1e1033;
      font-weight: 500;
    }

    .aepe-inline {
      font-size: 14px;
      line-height: 1.35;
      color: #1e1033;
      font-weight: 500;
    }

    .aepe-status-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    .aepe-status-badge--completed {
      color: #15803d;
      background: #d7ffe7;
    }

    .aepe-status-badge--pending {
      color: #4b405c;
      background: #ece9ef;
    }

    .aepe-actions-cell {
      text-align: right;
    }

    .aepe-row-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .aepe-action-btn {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid #e7e3ed;
    }

    .aepe-action-btn--view {
      background: #ffffff;
      color: #4b405c;
    }

    .aepe-action-btn--view svg {
      color: #4b405c;
      stroke: #4b405c;
    }

    .aepe-action-btn--reminder {
      background: #1e1033;
      color: #ffffff;
      border-color: #1e1033;
    }

    .aepe-more-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 1px solid #e7e3ed;
      background: #ffffff;
      color: #8b8499;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .aepe-empty {
      min-height: 160px;
      display: grid;
      place-items: center;
      border: 1px dashed #e5e1eb;
      border-radius: 16px;
      color: #787085;
      font-size: 14px;
      line-height: 1.45;
      background: #fbfafd;
    }

    @media (max-width: 900px) {
      .aep-header-top,
      .aep-profile-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .aep-header-actions {
        width: 100%;
      }

      .aep-profile-main {
        flex: none;
        width: 100%;
      }

      .aep-edit-btn {
        flex: 1;
        justify-content: center;
      }
    }

    @media (max-width: 760px) {
      .aep-page-wrap {
        padding: 6px 10px 12px;
        min-height: auto;
      }

      .aep-screen-card {
        border-radius: 20px;
        padding: 10px;
      }

      .aep-screen {
        gap: 8px;
      }

      .aep-header {
        gap: 8px;
        padding-bottom: 0;
      }

      .aep-breadcrumb,
      .aep-pager-btn,
      .aep-pager-progress {
        font-size: 13px;
        line-height: 1.35;
      }
    }

    @media (max-width: 520px) {
      .aep-tabs {
        gap: 12px;
      }

      .aep-tab {
        padding-bottom: 7px;
      }

      .aep-profile-avatar {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <div id="main-scroll">
      <div class="aep-page-wrap">
        <div class="aep-page-inner">
          <div class="aep-screen-card">
            <div id="appraisal-employee-profile-evaluators-root" class="aep-screen"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="performance_evaluation_components.js"></script>
<script src="performance_evaluation_detail_components.js"></script>
<script src="appraisal_employee_profile_components.js"></script>
<script src="appraisal_employee_profile_evaluators_components.js"></script>
<script>
(function() {
  'use strict';

  const screenData = {
    header: {
      breadcrumb: [
        'Performance evaluations list',
        'Performance evaluations name',
        'Employee profile'
      ],
      pager: {
        backLabel: 'Back',
        progress: '2 of 213',
        nextLabel: 'Next'
      },
      employee: {
        name: 'Sarah AlSubaie',
        role: 'HR Business Partner',
        review: 'Q1 2024 Performance Review',
        period: 'January - March 2024',
        state: 'In progress',
        avatar: 'https://randomuser.me/api/portraits/women/65.jpg'
      },
      actions: {
        primaryLabel: 'Edit evaluation'
      }
    },
    tabs: [
      { id: 'summary', label: 'Summary', icon: 'summary' },
      { id: 'answers', label: 'Answers', icon: 'answers' },
      { id: 'peer-feedback', label: 'Peer feedback', icon: 'peerFeedback' },
      { id: 'self-review', label: 'Self review', icon: 'selfReview' },
      { id: 'evaluators', label: 'Evaluators', icon: 'evaluators' }
    ],
    columns: [
      { type: 'checkbox', width: '34px' },
      { label: 'Employee name', width: '280px' },
      { label: 'Status', width: '220px' },
      { label: 'Employee role', width: '240px' },
      { label: 'Deadline', width: '200px' },
      { label: 'Actions', width: '260px' }
    ],
    rows: [
      {
        id: 'ev-1',
        name: 'Mishari AlSubaie',
        avatar: 'https://randomuser.me/api/portraits/men/32.jpg',
        status: 'completed',
        role: 'Direct manager',
        deadline: '29 Dec 2026',
        action: { variant: 'view', label: 'View evaluation' },
        checked: false
      },
      {
        id: 'ev-2',
        name: 'Turki Alsubaie',
        avatar: 'https://randomuser.me/api/portraits/men/67.jpg',
        status: 'pending',
        role: 'Employee',
        deadline: '29 Dec 2026',
        action: { variant: 'reminder', label: 'Send a reminder' },
        checked: false
      },
      {
        id: 'ev-3',
        name: 'Samira AlSubaie',
        avatar: 'https://randomuser.me/api/portraits/women/65.jpg',
        status: 'pending',
        role: 'HR manager',
        deadline: '29 Dec 2026',
        action: { variant: 'reminder', label: 'Send a reminder' },
        checked: false
      }
    ]
  };

  let activeTab = 'evaluators';
  let rows = JSON.parse(JSON.stringify(screenData.rows));
  const root = document.getElementById('appraisal-employee-profile-evaluators-root');

  function getSelectAllState(list) {
    const total = list.length;
    const selected = list.filter(function(row) {
      return !!row.checked;
    }).length;

    return {
      checked: total > 0 && selected === total,
      indeterminate: selected > 0 && selected < total
    };
  }

  function syncSelectAllCheckbox() {
    const selectAll = root.querySelector('[data-aepe-select-all]');
    if (!selectAll) return;

    const state = getSelectAllState(rows);
    selectAll.indeterminate = state.indeterminate;
  }

  function renderEvaluatorsBody() {
    if (activeTab !== 'evaluators') {
      return '<div class="aepe-empty">This standalone screen focuses on the Evaluators view.</div>';
    }

    return AppraisalEmployeeProfileEvaluatorsComponents.EvaluatorsTable({
      columns: screenData.columns,
      rows: rows,
      selectAll: getSelectAllState(rows)
    });
  }

  function render() {
    if (!root) return;

    root.innerHTML = `
      ${AppraisalEmployeeProfileComponents.Header(screenData.header)}
      ${AppraisalEmployeeProfileComponents.Tabs({
        tabs: screenData.tabs,
        activeTab: activeTab
      })}
      ${renderEvaluatorsBody()}
    `;

    syncSelectAllCheckbox();
  }

  function bindEvents() {
    if (!root || root.__aepEvaluatorsBound) return;

    root.addEventListener('click', function(event) {
      const tab = event.target.closest('[data-aep-tab]');
      if (!tab) return;

      activeTab = tab.getAttribute('data-aep-tab');
      render();
    });

    root.addEventListener('change', function(event) {
      if (event.target.matches('[data-aepe-select-all]')) {
        rows = rows.map(function(row) {
          return Object.assign({}, row, { checked: event.target.checked });
        });
        render();
        return;
      }

      if (!event.target.matches('[data-aepe-row-check]')) return;

      const id = event.target.getAttribute('data-aepe-row-check');
      rows = rows.map(function(row) {
        if (String(row.id) === String(id)) {
          return Object.assign({}, row, { checked: event.target.checked });
        }
        return row;
      });
      render();
    });

    root.__aepEvaluatorsBound = true;
  }

  document.addEventListener('DOMContentLoaded', function() {
    render();
    bindEvents();
  });
})();
</script>
</body>
</html>
