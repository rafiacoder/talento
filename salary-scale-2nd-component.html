<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Create New Salary Scale</title>
  <meta name="description" content="Talento HR Platform - Create new salary scale" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll { background: #f6f5f7; }
    .ss2-page-wrap { padding: 18px 18px 0; min-height: calc(100vh - 56px); }
    .ss2-flow-stack { width: min(100%, 760px); margin: 0 auto; display: grid; gap: 14px; }
    .ss2-page-title {
      font-size: 20px;
      line-height: 1.3;
      color: #1e1033;
      font-weight: 500;
      margin: 0;
    }

    .ss2-stepper {
      width: 100%;
      border: 1px solid #ece9ef;
      border-radius: 20px;
      background: #fff;
      min-height: 64px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 0;
      min-width: 0;
      box-shadow: 0 10px 24px rgba(30,16,51,.04);
      font-size: 0;
    }

    .ss2-step {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #9a93a8;
      font-size: 14px;
      line-height: 1.3;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .ss2-step-line {
      flex: 1 1 22px;
      min-width: 16px;
      height: 1px;
      background: #ece9ef;
      margin: 0 10px;
    }

    .ss2-step.active {
      color: #8b64e4;
      font-weight: 500;
      background: #f5f0ff;
    }

    .ss2-step-index {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid #ece9ef;
      color: #a19aae;
      font-size: 10px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      flex-shrink: 0;
    }

    .ss2-step.active .ss2-step-index {
      border-color: #8b64e4;
      color: #8b64e4;
      background: #fff;
    }

    .ss2-main-panel {
      width: 100%;
      border: 1px solid #ece9ef;
      border-radius: 20px;
      background: #fff;
      padding: 20px;
      min-width: 0;
      box-shadow: 0 10px 24px rgba(30,16,51,.04);
    }

    .ss2-main-title {
      font-size: 18px;
      line-height: 1.3;
      color: #1e1033;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .ss2-main-sub {
      font-size: 14px;
      line-height: 1.4;
      color: #6f6780;
      margin-bottom: 18px;
    }

    .ss2-form-card {
      border: 1px solid #ece9ef;
      border-radius: 16px;
      background: #fff;
      padding: 18px;
    }

    .ss2-form-title {
      font-size: 16px;
      line-height: 1.3;
      color: #1e1033;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .ss2-fields {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .ss2-field {
      display: grid;
      gap: 6px;
    }

    .ss2-field-label {
      font-size: 12px;
      line-height: 1.35;
      color: #787085;
      font-weight: 500;
    }

    .ss2-input {
      width: 100%;
      height: 40px;
      border: 1px solid #e8e3ed;
      border-radius: 10px;
      background: #fff;
      padding: 0 12px;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.2;
      outline: none;
    }

    .ss2-input:focus {
      border-color: #ab73ff;
      box-shadow: 0 0 0 4px rgba(171,115,255,.14);
    }

    .ss2-select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }

    .ss2-select-icon {
      color: #7f7890;
      font-size: 12px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .ss2-note {
      border: 1px solid #e5d7f8;
      border-radius: 12px;
      background: #f6efff;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .ss2-note-icon {
      color: #8b64e4;
      font-size: 12px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .ss2-note-title {
      font-size: 13px;
      line-height: 1.35;
      color: #1e1033;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .ss2-note-text {
      font-size: 13px;
      line-height: 1.45;
      color: #6f6780;
    }

    .ss2-footer {
      position: sticky;
      bottom: 0;
      margin: 12px auto 0;
      padding: 10px 0 14px;
      width: min(100%, 760px);
      background: #f6f5f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ss2-footer-step {
      font-size: 14px;
      line-height: 1.35;
      color: #a19aae;
      padding-left: 2px;
    }

    .ss2-footer-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 14px;
      border: 1px solid #e8e7eb;
      background: #fff;
      box-shadow: 0 10px 24px rgba(30,16,51,.04);
    }

    .ss2-btn {
      height: 36px;
      border-radius: 10px;
      border: 1px solid #e8e3ed;
      background: #fff;
      color: #6f6780;
      font-size: 14px;
      line-height: 1;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .ss2-btn:disabled {
      background: #f6f5f7;
      border-color: #ebe7f1;
      color: #b7b1c0;
      cursor: not-allowed;
    }

    .ss2-btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }

    .ss2-btn-icon i {
      font-size: 12px;
    }

    .ss2-btn:disabled .ss2-btn-icon {
      color: #b7b1c0;
    }

    .ss2-btn-next {
      background: #1e1033;
      border-color: #1e1033;
      color: #fff;
      box-shadow: 0 8px 18px rgba(53, 22, 89, .25);
    }

    .ss2-btn-next .ss2-btn-icon {
      color: #2cf7b3;
    }

    @media (max-width: 760px) {
      .ss2-page-wrap { padding: 16px 12px 0; }
      .ss2-stepper { flex-wrap: wrap; row-gap: 10px; }
      .ss2-step-line { display: none; }

      .ss2-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .ss2-footer-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="ss2-page-wrap">
        <div id="salary-scale-2-root"></div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="salary_scale_2_components.js"></script>
<script src="salary-scale-2nd-screen.js"></script>
</body>
</html>
