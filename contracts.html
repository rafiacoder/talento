<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Contracts</title>
  <meta name="description" content="Talento HR Platform - Contracts" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>
  <style>
    #main-scroll { background: #f6f5f7; }
    .ct-wrap { padding: 18px; }
    .ct-page {
      background: #fff;
      border: 1px solid #ece9ef;
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .ct-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ct-head h1 {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
    }
    .ct-primary-btn {
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid #1e1033;
      background: #1e1033;
      color: #fff;
      font-size: 14px;
      line-height: 1.3;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      box-shadow: 0 8px 18px rgba(53, 22, 89, .2);
      font-weight: 500;
    }
    .ct-primary-btn i { color: #2CF7B3; font-size: 12px; }

    .ct-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .ct-summary-card {
      border: 1px solid #e8e3ed;
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-height: 92px;
    }
    .ct-summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ct-summary-label {
      color: #61597a;
      font-size: 14px;
      line-height: 1.35;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ct-summary-arrow { color: #787085; font-size: 12px; }
    .ct-summary-value {
      margin: 0;
      color: #1e1033;
      font-size: 36px;
      line-height: 1;
      font-weight: 500;
    }
    .ct-summary-value--expiring { color: #a16207; }
    .ct-summary-value--expired { color: #787085; }

    .ct-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ct-toolbar-search { width: min(100%, 390px); }
    .ct-toolbar-search .search-input-wrap {
      width: 100% !important;
      min-height: 38px !important;
      border-radius: 999px !important;
      border-color: #e3dee9 !important;
    }
    .ct-toolbar-actions { display: inline-flex; align-items: center; gap: 8px; }
    .ct-pill-btn {
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid #dfdae5;
      background: #fff;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.3;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
    }
    .ct-pill-btn strong { color: #1e1033; font-weight: 500; }
    .ct-count { color: #787085; }

    .ct-table-wrap {
      border: 1px solid #ece9ef;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }
    .ct-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1160px;
    }
    .ct-table thead tr { background: #f6f5f7; border-bottom: 1px solid #ece9ef; }
    .ct-table th,
    .ct-table td {
      padding: 10px 10px;
      text-align: left;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.35;
      white-space: nowrap;
      vertical-align: middle;
    }
    .ct-table th {
      color: #787085;
      font-weight: 400;
    }
    .ct-table tbody tr { border-bottom: 1px solid #f0eef6; }
    .ct-table tbody tr:last-child { border-bottom: 0; }
    .ct-sort {
      color: #a09aab;
      font-size: 11px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .ct-employee { min-width: 0; }
    .ct-employee img { width: 26px !important; height: 26px !important; }
    .ct-employee p {
      max-width: 142px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin: 0;
      font-size: 14px !important;
    }

    .ct-badge {
      min-height: 22px;
      border-radius: 999px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
    }
    .ct-badge--active { color: #15803d; background: #d7ffe7; }
    .ct-badge--expiring { color: #a16207; background: #fef3c7; }
    .ct-badge--expired { color: #dc2626; background: #fee2e2; }

    .ct-duration {
      display: grid;
      gap: 6px;
      min-width: 270px;
    }
    .ct-duration-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ct-duration-top strong,
    .ct-duration-top span {
      font-size: 14px;
      line-height: 1.35;
    }
    .ct-duration-top strong { color: #1e1033; font-weight: 500; }
    .ct-duration-top span { color: #6f687d; font-weight: 400; }
    .ct-duration-bar {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: #ece9ef;
      overflow: hidden;
      display: block;
    }
    .ct-duration-bar > span { height: 100%; border-radius: inherit; display: block; }

    .ct-actions-cell { text-align: center; }
    .ct-more-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: #7f778d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 1200px) {
      .ct-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .ct-wrap { padding: 14px 12px; }
    }
    @media (max-width: 640px) {
      .ct-wrap { padding: 12px 10px; }
      .ct-page { padding: 12px; }
      .ct-summary-grid { grid-template-columns: 1fr; }
      .ct-primary-btn { width: 100%; justify-content: center; }
      .ct-toolbar-actions { width: 100%; }
      .ct-pill-btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="ct-wrap">
        <div id="contracts-root" class="ct-page"></div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="leave_components.js"></script>
<script src="contracts_components.js"></script>
<script>
(function() {
  'use strict';

  const rows = Array.from({ length: 12 }).map(function(_, index) {
    const statusCycle = [
      { key: 'active', label: 'Active' },
      { key: 'expiring', label: 'Expires soon' },
      { key: 'expired', label: 'Expired' },
      { key: 'active', label: 'Active' }
    ];
    const durationCycle = [
      { term: '2 years', range: '23 Jun 2025 - 23 Jun 2027', state: 'active', progress: '52%' },
      { term: '1 year', range: '02 Dec 2025 - 02 Dec 2026', state: 'expiring', progress: '90%' },
      { term: '1 year', range: '02 Dec 2025 - 02 Dec 2026', state: 'expired', progress: '100%' },
      { term: '2 years', range: '23 Jun 2025 - 23 Jun 2027', state: 'active', progress: '52%' }
    ];
    const status = statusCycle[index % statusCycle.length];
    const duration = durationCycle[index % durationCycle.length];
    const salary = status.key === 'active' ? 'SAR 14,000' : 'SAR 8,520';
    const total = status.key === 'active' ? 'SAR 20,000' : 'SAR 14,520';

    return {
      code: '#LARO0358',
      employee: { name: 'Mishari AlSubaie', avatar: 'https://i.pravatar.cc/52?img=12' },
      hiringDate: '25 Dec 2025',
      status: status,
      duration: duration,
      salary: salary,
      totalCost: total
    };
  });

  const screenData = {
    header: { title: 'Contracts', actionLabel: 'Create new contract' },
    summary: {
      items: [
        { icon: ContractsComponents.Icons.active, label: 'Active contracts', value: '43 contracts' },
        { icon: ContractsComponents.Icons.expiring, label: 'Contracts expiring soon', value: '02 contracts', tone: 'expiring' },
        { icon: ContractsComponents.Icons.drafts, label: 'Drafts', value: '03 Drafts' },
        { icon: ContractsComponents.Icons.expired, label: 'Expired contracts', value: '00 contracts', tone: 'expired' }
      ]
    },
    toolbar: {
      searchPlaceholder: 'Search by name, ID, iqama, title or email',
      filterCount: '2',
      sortLabel: 'Name'
    },
    table: { rows: rows }
  };

  const root = document.getElementById('contracts-root');

  function renderScreen() {
    if (!root) return;
    root.innerHTML = `
      ${ContractsComponents.TopHeader(screenData.header)}
      ${ContractsComponents.SummarySection(screenData.summary)}
      ${ContractsComponents.Toolbar(screenData.toolbar)}
      ${ContractsComponents.ContractsTable(screenData.table)}
    `;
  }

  document.addEventListener('DOMContentLoaded', renderScreen);
})();
</script>
</body>
</html>
